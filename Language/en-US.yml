  STR_TEST_EVENT: "Pleasant Surprise"
  STR_TEST_EVENT_DESCRIPTION: "{NEWLINE}The base we chose to operate from is quite old, but it still holds its secrets. It looks like the previous team left some equipment in one of the sectors!{NEWLINE}{NEWLINE}[{ALT}Found 3 Military Crates!{ALT}]"

  # NEWS
  STR_GNN_NEWS_001: "Shadow News"
  STR_GNN_NEWS_002: "Shadow News"
  STR_GNN_NEWS_003: "Shadow News"
  STR_GNN_NEWS_004: "Shadow News"
  STR_GNN_NEWS_005: "Shadow News"
  STR_GNN_NEWS_006: "Shadow News"

  STR_GNN_MURDER_1_DESCRIPTION: "{NEWLINE}Yesterday morning, the bodies of three prominent anti-corruption activists were found in one of the abandoned landfills of Megaprim {0}. Megapol denies any political motive, stating that these individuals should have spent more money on their own security instead of foolish things like fighting corruption."

  STR_GNN_MURDER_2_DESCRIPTION: "Last week, the body of a journalist investigating one of Zaibatsu's enterprises was found. Her skull was crushed and signs of sexual assault were discovered on the body. At a recent press conference, a Zaibatsu representative smiled brightly and commented on the incident, advising media companies to pay less attention to ordinary thug attacks."

  STR_GNN_MURDER_3_DESCRIPTION: "{NEWLINE}Last Tuesday, eco-activists staged a protest in the Megaprim {ALT}{0}{ALT} museum. The protesters poured paint on an ancient artifact found in the Tau Ceti-12 system as a sign of protest against the use of nuclear energy in warp engines. The exhibition curator, who personally killed the vandals in front of a cheering crowd, called the incident an act of disrespect toward the Astronauts Guild and will demand compensation from the families of the deceased for damaging expensive property."

  STR_GNN_EXPLOTION_1_DESCRIPTION: "{NEWLINE}...And in other news. Last Tuesday, an explosion occurred in a residential complex in one of the sectors of Megaprim {0}. Residents and victims claim they saw people and vans from the construction company «Construction Inc.» a few days earlier. Company representatives state that the building demolition was pre-planned and pre-approved by local authorities. Megapol leadership promised to investigate the matter as soon as possible."

  STR_GNN_EXPLOTION_2_DESCRIPTION: "...and in other news! Yesterday morning a terrorist attack was carried out in one of the sectors of Megaprim {ALT}{0}{ALT}. Separatists carried out a series of explosions in a residential area — dozens dead, hundreds injured. Megapol is investigating this inhumane act; suspects are being questioned and have already been detained.{NEWLINE}This news was brought to you by the Central European restaurant chain «Chyrvony Kutok».{NEWLINE}«Eat till you burst!»"

  STR_GNN_SIN_TERROR_1_DESCRIPTION: "{NEWLINE}Fierce fighting took place in the city of {0} between security forces and the terrorist group «SiN». Megapol forces suffered losses but managed to contain the terrorist rampage. One anonymous soldier reports that some attackers were using advanced weapons and armor."

  STR_GNN_SIN_AD_1_DESCRIPTION: "{NEWLINE}...And this news block was sponsored by «Bloodsport». (Voice switches to a male announcer) Every Saturday. At 11:00. We Make HISTORY in the entertainment industry! We take twenty recently paroled prisoners, give them rifles, machine guns and rocket launchers, and make them fight to the death! This is the reality show that changed "

