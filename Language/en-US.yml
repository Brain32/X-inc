en-US:
                    ############# Armours #############
# ARMOUR
  STR_ARMOUR: "SPECIAL ARMOUR"
  STR_RUNNER_COAT: "Coat"
  STR_RUNNERCOAT_UC: "COAT"
  STR_RUNNERCOAT_UFOPEDIA: "Standard dress code of our operations department. This coat is made of super-fiber that can, in theory, stop small-caliber bullets, but don't expect miracles."

  STR_JUMPSUIT: "Jumpsuit"
  STR_JUMPSUIT_UC: "JUMPSUIT"
  STR_JUMPSUIT_UFOPEDIA: "Light specialized clothing made from the widely used material known as 'Super-Fiber'. The protective layer is quite laughable to be considered real armor, but the jumpsuit is very light and does not restrict the operative's movement, allowing maximum mobility on the battlefield."

  STR_BULDOZER_SUIT: "Bulldozer"
  STR_BULDOZER_SUIT_UC: "BULLDOZER"
  STR_BULDOZER_SUIT_STUDY: "Bulldozer Armor"
  STR_BULDOZER_SUIT_UFOPEDIA: "Heavy special suit made of plastisteel. It provides good protection against small-caliber bullets and buckshot. The built-in respirator and primitive night vision device help the wearer navigate in darkness."

  STR_DEFENDER_SUIT: "Cyclops"
  STR_DEFENDER_SUIT_UC: "CYCLOPS"
  STR_DEFENDER_SUIT_STUDY: "Cyclops Armor"
  STR_DEFENDER_SUIT_UFOPEDIA: "The main feature of this armor is its advanced and expensive visor, which assists with aiming. It allows the wearer to quickly orient themselves and make decisions in combat situations.{NEWLINE}Night Vision: {ALT}14{ALT}"

  STR_DEFLECTOR_SUIT: "Deflector Power Armor"
  STR_DEFLECTOR_SUIT_UC: "DEFLECTOR"
  STR_DEFLECTOR_SUIT_UFOPEDIA: "An old model of power armor developed during the First Alien Invasion. Running is impossible."

  STR_SWAT_SUIT_UC: "SWAT GEAR"
  STR_SWAT_SUIT: "SWAT Gear"
  STR_SWAT_SUIT_UFOPEDIA: "A modern set of armor used by special forces. Heavy plated armor combined with advanced electronics makes it an excellent personal protection suit for urban combat.{NEWLINE}Night Vision: {ALT}16{ALT}"
  STR_SWAT_SUIT_STUDY: "Purchase SWAT Gear"

  STR_COMBAT_ARMOUR_MK1: "Combat Armor Mk1"
  STR_COMBAT_ARMOUR_MK1_UC: "COMBAT ARMOR MK1"
  STR_COMBAT_ARMOUR_MK1_UFOPEDIA: "Made from advanced polymers and alloys, this armor offers excellent protection against small-caliber bullets and light buckshot. The built-in night vision device in the visor allows good visibility at night.{NEWLINE}Night Vision: {ALT}14{ALT}"
  STR_COMBAT_ARMOUR_MK1_STUDY: "Purchase Combat Armor"

  STR_COMBAT_ARMOUR_UPGRATE_PROJECT: "Manufacture Combat Armor Mk2"
  STR_COMBAT_ARMOUR_MK2: "Combat Armor Mk2"
  STR_COMBAT_ARMOUR_MK2_UC: "COMBAT ARMOR MK2"
  STR_COMBAT_ARMOUR_MK2_UFOPEDIA: "Light plastisteel plates made it possible to reduce the weight of the armor without sacrificing protection. The improved visor electronics slightly assist with aiming.{NEWLINE}Night Vision: {ALT}16{ALT}"

  STR_CIV_VEST: "Civilian Vest"
  STR_CIVILVEST_ARMOUR_UC: "CIVILIAN VEST"
  STR_CIVILVEST_ARMOUR_UFOPEDIA: "A simple ballistic vest that almost anyone can afford without dealing with bureaucratic nonsense. The Kevlar layer is quite laughable."
  STR_CIVIL_VEST_ARMOR_STUDY: "Purchase Civilian Vest"

  STR_ARMOUR_SECVEST: "Security Vest"
  STR_SECVEST_ARMOUR_UC: "SECURITY VEST"
  STR_SECVEST_ARMOUR_UFOPEDIA: "Thanks to some connections in Megapolis, we can order these simple Kevlar vests. The layer is thick enough to stop small-caliber bullets and buckshot. The helmet is equipped with a primitive night and thermal vision device.{NEWLINE}Night Vision: {ALT}10{ALT}"
  STR_ARMOUR_SECVEST_STUDY: "Purchase Security Vest"

  STR_ICARUS_COAT: "Icarus Coat"
  STR_ICARUS_COAT_UC: "ICARUS COAT"
  STR_ICARUS_COAT_STUDY: "Icarus Coat"
  STR_ICARUS_COAT_UFOPEDIA: "After diving deep into plated armor design and spending a lot of time on development, we managed to make composite plates thin enough to be worn concealed under normal clothing. We used the freed space to install implants and other electronics."

  STR_TAURUS_ARMOUR: "Taurus Armor"
  STR_TAURUS_ARMOUR_UC: "TAURUS"
  STR_TAURUS_ARMOUR_STUDY: "Taurus Armor"
  STR_TAURUS_ARMOUR_UFOPEDIA: "Our first attempt at designing our own armor. The torso is reinforced with a thick layer of aquaplastic, and the helmet protects against concussive attacks."

  STR_JUMPSUIT_JETPACK_STUDY: "Purchase Jetpack"
  STR_JUMPSUIT_JETPACK: "Jetpack"
  STR_JUMPSUIT_JETPACK_UC: "JETPACK"
  STR_JUMPSUIT_JETPACK_UFOPEDIA: "A simple commercial-grade jetpack. Mostly used for boring everyday tasks, but we could find a use for it. It occupies one hand slot, so using two-handed weapons will be problematic."

  STR_IRONCLAD: "Ironclad Power Armor"
  STR_IRONCLAD_UC: "IRONCLAD"
  STR_IRONCLAD_UFOPEDIA: "A popular model of power armor for colonial infantry in the outer colonies. Since the users often face the fauna and horrors of distant planets, the armor is designed to excellently deflect bites and cutting attacks, but offers poor protection against energy weapons.{NEWLINE}Running is impossible.{NEWLINE}Night Vision: {ALT}16{ALT}"

  STR_NIGHTOPS_BUY: "Purchase Night Ops Jumpsuit"
  STR_NIGHTOPS_ARMOR: "Night Ops Gear"
  STR_NIGHTOPS_ARMOUR: "Night Ops Armor"
  STR_NIGHTOPS_ARMOUR_UC: "NIGHT OPS"
  STR_NIGHTOPS_ARMOUR_UFOPEDIA: "A simple Kevlar vest equipped with a night and thermal vision device. The vest is not thick enough to withstand rifle caliber, so it is recommended to keep operatives at a distance.{NEWLINE}Night Vision: {ALT}14{ALT}"

  STR_TEMPLAR_PA: "Templar Power Armor"
  STR_TEMPLAR_PA_UC: "TEMPLAR"
  STR_TEMPLAR_ARMOR_STUDY: "Super-Heavy Power Armor Project"
  STR_TEMPLAR_PA_UFOPEDIA: "Super-heavy power armor. Running is impossible, as is crouching and sidestepping. HUGE target. Turning costs 2 TU."

# YOUR ROBOTS
  STR_MECHSUIT_ARMOR_UC: "MECH/SCOUT"
  STR_MECHSUIT_ARMOR_UFOPEDIA: "Basic model of a MECH-robot designed for terrain reconnaissance."

  STR_SECBOT_MK1_BUY: "Purchase Security Drone"
  STR_SECBOT_MK1: "Security Drone Mk"
  STR_SECBOT_MK1_UC: "SECURITY DRONE Mk1"
  STR_SECBOT_MK1_UC_UFOPEDIA: "Simple commercial security drone."
  STR_SECBOT_BLACK_CORPSE: "Security Drone Wreckage"

# COMPONENTS
  STR_POWER_ARMOR_PARTS: "Power Armor Parts"
  STR_POWER_ARMOR_PARTS_UFOPEDIA: "Various components required for manufacturing powered armor."

  STR_POWER_CELL: "Power Cell"
  STR_POWER_CELL_UFOPEDIA: "Elerium power cell used to supply energy to various systems such as power armor or heavy weapons."

  STR_SC_WIRE: "Superconductor"
  STR_SC_WIRE_UFOPEDIA: "This material is intended for use in the production of aircraft or various types of laser weapons."

  STR_OPTRONIC_PARTS: "Optronic Components"
  STR_OPTRONIC_PARTS_UFOPEDIA: "The heart of any advanced device that uses light instead of electricity. Used by the aliens during the invasion as a component in navigation units."

  STR_XENOLITE_BLOCK: "Xenolite Block"
  STR_XENOLITE_BLOCK_UFOPEDIA: "A sentient crystal of extraterrestrial origin whose structure resembles the human brain, complete with its own neuron system and micro-conductors. Such blocks are quite rare and are usually used in the construction of AI systems for aircars or military and civilian drones."

  STR_DURATHREAD: "Super-Fiber"
  STR_DURATHREAD_UFOPEDIA: "Extremely durable fabric used in the production of clothing and protective equipment. Special treatment gives it excellent protective properties against electricity and chemicals."

  STR_AQUA_PLASTICS: "Aquaplastic"
  STR_AQUA_PLASTICS_UFOPEDIA: "Widely used in the production of various tools and plated armor."

  STR_GRAV_MODULE: "Gravity Module"
  STR_GRAV_MODULE_UFOPEDIA: "A small grav-module used in the production of levitation armor and transport vehicles."

# WEAPONS - BUILT-IN
  STR_MECHA_GRABBER: "Power Grabber"
  STR_MECHA_RL: "MECH Rocket Launcher"
  STR_MECHA_RL_ROCKET: "Rocket Set"

# WEAPONS - MELEE
  STR_UNARMED_BAISIC: "Fists"
  STR_UNARMED_BAISIC_UFOPEDIA: "If you have nothing at hand, why not use your own fists? Damage and accuracy depend on your close combat skill, strength, and reflexes."

  STR_UNARMED_ROBO: "Fists (Robot)"
  STR_UNARMED_ROBO_UFOPEDIA: "Droids can fight too, though not as precisely as humans. However, their attacks deal slightly more stun damage."

  STR_KNUCKLES: "Brass Knuckles"
  STR_KNUCKLES_UFOPEDIA: "Popular street weapon among thugs of all kinds. Fits in a pocket and breaks faces just as well as any club. Requires some skill and strength from the user."

  STR_STUN_BATON: "Police Baton"
  STR_STUN_BATON_UFOPEDIA: "Even though we are a private mercenary organization, Megapol has still approved the use of these electro-batons. The discharge is non-lethal but still causes some harm to the target's health."

  STR_SHIV: "Shiv"
  STR_SHIV_UFOPEDIA: "A small piece of sharpened metal designed to inflict small but painful wounds."

  STR_STABKNIFE: "Push Dagger"
  STR_STABKNIFE_UFOPEDIA: "This special type of knife relies more on the user's strength than on their skill."

  STR_MACHETE: "Machete"
  STR_MACHETE_UFOPEDIA: "A wide and long blade originally intended for cutting vegetation."

  STR_KNIFE_BANDIT: "Bandit Knife"
  STR_KNIFE_BANDIT_UFOPEDIA: "This large knife is used by raiders and bandits. Requires determination from the wielder."

  STR_COMBAT_KNIFE: "Combat Knife"
  STR_COMBAT_KNIFE_UFOPEDIA: "A well-made steel knife. Effective use requires both strength and close combat skill."

  STR_PIPE: "Metal Pipe"
  STR_PIPE_UFOPEDIA: "A steel pipe that can serve as an improvised club if you have nothing better."

  STR_CROWBAR: "Crowbar"
  STR_CROWBAR_UFOPEDIA: "Favorite weapon of MIT graduates."

  STR_WRENCH: "Wrench"
  STR_WRENCH_UFOPEDIA: "Colonial marine legends say that once, with a wrench just like this, an unnamed soldier single-handedly wiped out hordes of mutants and berserk cyborgs aboard one of the mega starships. They might be exaggerating, but one thing you can't lie about is this heavy chunk of metal that can smash your skull in seconds."

  STR_CUTLASS: "Cutlass"
  STR_CUTLASS_UFOPEDIA: "A cool-looking saber once used by ancient bandits. Surprisingly still quite effective."

  STR_GOLF_STICK: "Golf Club"
  STR_GOLF_STICK_UFOPEDIA: "A golf club. A strange choice for melee combat, but no less effective."

  STR_BATTO: "Baseball Bat"
  STR_BATTO_UFOPEDIA: "In the old days it was used for a popular ball-hitting game. Now it's popular among thugs for cracking skulls — and does the job very well!"

  STR_FIRE_AX: "Fire Axe"
  STR_FIRE_AX_UFOPEDIA: "An axe for breaking down barriers or debris during fires."

  STR_CARBONBLADE: "Carbon Blade"
  STR_CARBONBLADE_UFOPEDIA: "A blade made of carbon fiber, currently popular among street thugs who want to become urban samurai."

  STR_CYBER_SWORD: "Electro-Sword"
  STR_CYBER_SWORD_UFOPEDIA: "A popular model of electro-sword powered by a small elerium battery. Cuts through armor like butter."

  STR_HAMMER: "Sledgehammer"
  STR_HAMMER_UFOPEDIA: "If something is in your way — smash it to fucking pieces."

  STR_CYBER_KATANA: "Electro Katana"
  STR_CYBER_KATANA_BUY: "Purchase Electro-Sword"
  STR_CYBER_KATANA_UFOPEDIA: "A high-tech katana produced in Neo Japan. Excellent at cutting through armor."

  STR_SUPER_HAMMER: "Super Sledgehammer"
  STR_SUPER_HAMMER_UFOPEDIA: "A heavy beast with a pneumatic booster. Mostly used as a tool in everyday work."

  STR_CHAINSAW: "Chainsaw"
  STR_CHAINSAW_UFOPEDIA: "An old tool for cutting wood."

# WEAPONS - PISTOLS
  STR_LIBIRATOR_JUNK: "Junk Pistol"
  STR_LIBIRATOR_JUNK_UFOPEDIA: "A pistol slapped together in the Wastes from whatever scrap was lying around (as is usual out there). The assembly is so terrible you can barely hit anything with it. Its only advantages are compactness and small size. Perfect for undercover missions."

  STR_10MM_TRIPLE_CLIP: "10mm / AP Ammo"
  STR_CIV_PISTOL_LT: "Pocket Pistol"
  STR_PISTOL_LT_CLIP: "Pocket Pistol Mag"
  STR_PISTOL_LT_CLIP_SLAYER: "Pocket Pistol Mag / Slayer"
  STR_SMG_LINDA: "Linda SMG"
  STR_SMG_LINDA_UFOPEDIA: "Civilian model submachine gun that uses 9mm magazines."

  STR_CIV_PISTOL_LT_UFOPEDIA: "A successful attempt by MiliTech to conquer the civilian market. This small 'UTF-57' pistol fits in a pocket and is very easy to use. For those with a taste for violence, it also supports high-power ammunition with a smaller magazine."

  STR_CIV_PISTOL_HW: "Heavy Shortbarrel"
  STR_PISTOL_HW_CLIP: "Heavy Shortbarrel Mag"
  STR_CIV_PISTOL_HW_UFOPEDIA: "The design of this mini-pistol allows the use of heavier ammunition, although it is slightly slower."

  STR_MILITECH_PISTOL_HP93S: "MiliTech P93S Pistol"
  STR_MILITECH_PISTOL_HP93S_CLIP: "MiliTech P93S Mag"
  STR_MILITECH_PISTOL_HP93S_UFOPEDIA: "If you need a reliable, no-nonsense pistol without fancy gadgets, MiliTech has exactly what you want! This trustworthy sidearm is used by almost everyone living in the megacities and is considered the 'golden middle' among pistols."

  STR_COLT_KJ58S: "Colt KJ58S"
  STR_COLT_KJ58S_CLIP: "KJ58S Mag"
  STR_COLT_KJ58S_UFOPEDIA: "The newly reorganized Colt company, together with the US government, proudly presents its new KJ-58-S pistol. The noticeable power of this weapon makes it excellent for neutralizing better-armored opponents."

  STR_CHEAP_3DPISTOL: "Slaught-O-Matic"
  STR_CHEAP_3DPISTOL_UFOPEDIA: "No cash for a proper gun? This cheap disposable pistol fits anyone's budget in the social pyramid! 3D-printed from plastic, this piece of junk tends to jam, break, and fall apart right in your hands. Don't even think about its stopping power. Cannot be reloaded."

  STR_BANDIT_REVOLVER: "Bandit Revolver"
  STR_BANDIT_REVOLVER_AMMO: "Bandit Revolver Cylinder"
  STR_BANDIT_REVOLVER_UFOPEDIA: "Despite its respectable age, this revolver is still powerful. However, its cylinder mechanism makes reloading slow and tedious."

  STR_PISTOL_10MM: "Bandit Pistol"
  STR_PISTOL_10MM_MAG: "Bandit Pistol Mag"
  STR_PISTOL_10MM_MAG_AA: "Bandit Pistol Mag / AP"
  STR_PISTOL_10MM_UFOPEDIA: "A vicious-looking semi-automatic pistol assembled in the back alleys of the Wastes. Despite its origin, it is well-made and offers impressive accuracy and stopping power."

  STR_D_EAGLE: "Freedom Eagle Pistol"
  STR_D_EAGLE_CLIP: "Freedom Eagle Mag"
  STR_D_EAGLE_UFOPEDIA: "American classic and a true rarity! Designed in Israel, this pistol — despite its heavy pop-culture fame — is damn impractical and uncomfortable. Still, some collectors and security company bosses are willing to pay big money to own one."

  STR_SCOPED_MAGNUM: "Scoped Magnum"
  STR_SCOPED_MAGNUM_DRUM: "Scoped Magnum Speedloader"
  STR_SCOPED_MAGNUM_UFOPEDIA: "A heavy revolver with a simple collimator sight. The caliber is powerful enough to punch through basic armor, though ammo capacity is pretty poor. Comes with a convenient 5-round speedloader."

  STR_MAGNUM: "Colt Python"
  STR_MAGNUM_UFOPEDIA: "A living classic. This standard revolver was made long before the alien invasion. Despite its age, it is elegantly built and possesses lethal stopping power."

  STR_COLT45: "Colt .45"
  STR_COLT45_CLIP: "Colt Mag"
  STR_COLT45_CLIP_AA: "Colt Mag / AP"
  STR_COLT45_CLIP_EXT: "Extended Colt Mag"
  STR_COLT45_CLIP_AA_EXT: "Extended Colt Mag / AP"
  STR_COLT45_UFOPEDIA: "An elegant weapon from a more civilized age. This reliable pistol is a favorite personal sidearm among smugglers. Accurate, powerful, and simple to handle."

  STR_REBEL_COLT45: "Advanced Colt .45"
  STR_REBEL_COLT45_UFOPEDIA: "Manufactured by the Rebels, this modified M1911 can fire in full-auto thanks to its improved design."

  STR_HB_GAUSS_PISTOL: "Gauss Pistol"
  STR_HB_GAUSS_PISTOL_CLIP: "Gauss Pistol Mag"
  STR_HB_GAUSS_PISTOL_UFOPEDIA: "Pre-war model gauss pistol."

  STR_AUTO9_PISTOL: "Predator Pistol"
  STR_AUTO9_PISTOL_UFOPEDIA: "Police issue pistol. Please return to the nearest Megapol office."
  STR_AUTO9_PISTOL_CLIP: "Predator Mag"

  STR_LASER_PISTOL_MIB: "Laser Pistol"
  STR_LASER_PISTOL_MIB_UFOPEDIA: "Popular model of laser weapon."
  STR_LASER_PISTOL_MIB_CLIP: "Laser Pistol Battery"
  STR_LASER_PISTOL_MIB_CLIP_HI: "Laser Pistol Battery / PRO"

# WEAPONS - RIFLES
  STR_G11: "G11"
  STR_G11E: "G11E"
  STR_G11_CLIP: "G11 Magazine"
  STR_G11_UFOPEDIA: "Pre-war rifle. Its complex mechanism and expensive ammunition made it unpopular in the 20th century. Today it is highly valued by experienced fighters."
  STR_G11E_UFOPEDIA: "Advanced G11 version equipped with automatic stabilizer, ballistic computer, and optronic sight. In short — aim faster and worry less about recoil! Unfortunately, this variant is quite rare and was probably custom-made."

  STR_JUNKY_SAWED_OFF: "Junk Sawed-Off"
  STR_JUNKY_SAWED_OFF_UFOPEDIA: "Double-barrel shotgun widely used by Wastelanders. Cheap, low-quality parts were used in its construction. The creator clearly didn't care."

  STR_DOUBLE_BARRELED_BUCKSHOT: "Buckshot (.8g)"
  STR_DOUBLE_BARRELED_BUCKSHOT_SLUG: "Slug (.6g)"

  STR_TEC9: "Ghetto SMG"
  STR_TEC9_CLIP: "9mm SMG Mag"
  STR_TEC9_UFOPEDIA: "Rusty 9x19mm submachine gun. Popular, as the name suggests, among ghetto residents."

  STR_OLD_RIFLE_M16: "Scavenger Rifle"
  STR_RIFLE_M16_CLIP: "M16 Mag"
  STR_OLD_RIFLE_M16_UFOPEDIA: "The only advantage of this poorly assembled rifle is the lack of an electronic trigger lock. Otherwise it is inferior even to civilian models."

  STR_HUNTING_RIFLE_CLIP: "Hunting Rifle Clip"
  STR_OLD_HUNTING_RIFLE: "Hunting Rifle"
  STR_OLD_HUNTING_RIFLE_UFOPEDIA: "Slightly worn but very simple and reliable rifle. Requires patience from the shooter, but the results are worth it."

  STR_OLD_SHOTGUN: "Old Shotgun"
  STR_OLD_SHOTGUN_SHELLS_SLUG: "Heavy Shotgun Slug / AP"
  STR_OLD_SHOTGUN_SHELLS: "Heavy Shotgun Shells"
  STR_OLD_SHOTGUN_UFOPEDIA: "This shotgun has definitely seen better days."

  STR_PS94: "PS94"
  STR_PS94_UFOPEDIA: "A two-shot device that easily fits in a pocket. Fires a small plasma charge but has very limited range."

  STR_LASER_CIVIPHASER: "Pocket Laser"
  STR_LASER_CIVIPHASER_UFOPEDIA: "Portable laser weapon, commonly called a 'Phaser'. Has unlimited ammo but unimpressive damage. Good for scaring off thugs or small mutants."

  STR_BLACKOPS_COMPACT: "Syndicate Compact"
  STR_BLACKOPS_COMPACT_CLIP: "Syndicate Compact Mag"
  STR_BLACKOPS_COMPACT_CLIP_AA: "Syndicate Compact Mag / AP"
  STR_BLACKOPS_COMPACT_UFOPEDIA: "Custom-made for Syndicate agents — this high-quality pistol is small enough to be perfect for undercover missions."

  STR_PISTOL: "BlackOps Pistol"
  STR_PISTOL_UFOPEDIA: "Standard 10mm pistol from BlackOps. Equipped with a laser sight."

  STR_SMART_PISTOL: "BlackOps Smart Pistol"
  STR_SMART_PISTOL_UFOPEDIA: "The built-in electronics allow faster aiming and semi-automatic fire."

  STR_BLACKOPS_COMMANDO: "BlackOps Commando"
  STR_BLACKOPS_COMMANDO_CLIP: "BlackOps Commando Mag"
  STR_BLACKOPS_COMMANDO_CLIP_AA: "BlackOps Commando Mag / AP"
  STR_BLACKOPS_COMMANDO_UFOPEDIA: "This powerful pistol borrows its design from the pre-war Desert Eagle. Despite BlackOps' efforts to fix its flaws, it still has heavy recoil and low magazine capacity. Still looks badass in the hands of veteran marines."

  STR_BLACKOPS_MAGNUM: "BlackOps Magnum"
  STR_MAGNUM_ROUNDS: "Magnum Speedloader"
  STR_MAGNUM_ROUNDS_AA: "Magnum Speedloader / AP"
  STR_BLACKOPS_MAGNUM_UFOPEDIA: "This revolver variant comes with a built-in laser sight and primitive stabilizer."

  STR_RIFLE: "BlackOps Rifle"
  STR_RIFLE_UFOPEDIA: "Rumored to be similar to the rifle used by X-Com operatives during the alien invasion. Whether that's true or just clever marketing is up to you — but the rifle performs well at medium and long range."

  STR_BLACKOPS_SHORTRIFLE: "BlackOps Carbine"
  STR_BLACKOPS_SHORTRIFLE_UFOPEDIA: "A mix of carbine and rifle. Uses the same ammo as the standard BlackOps rifle, but long-range accuracy leaves much to be desired."

  STR_RIFLE_CLIP_AA: "Rifle Magazine / AP"

  STR_BLACKOPS_ADV_SMG: "Advanced BlackOps SMG"
  STR_BLACKOPS_ADV_SMG_CLIP: "BlackOps SMG Mag"
  STR_BLACKOPS_ADV_SMG_AA_CLIP: "BlackOps SMG Mag / AP"
  STR_BLACKOPS_ADV_SMG_UFOPEDIA: "Compact, excellent close-range fire rate, and sensor suite for improved accuracy. What more could you want?"

  STR_BO_LMG: "BlackOps Light Machine Gun"
  STR_BO_LMG_CLIP: "BlackOps LMG Drum"
  STR_BO_LMG_CLIP_AP: "BlackOps LMG Drum / AP"
  STR_BO_LMG_CLIP_AA: "BlackOps LMG Drum / AP"
  STR_BO_LMG_UFOPEDIA: "Heavy version of the BlackOps rifle. Equipped with a bipod and primitive stabilizer — ideal for suppressive fire."

  STR_BO_SNIPER_RIFLE: "BlackOps Sniper Rifle"
  STR_BO_SNIPER_RIFLE_CLIP: "BlackOps Sniper Mag"
  STR_BO_SNIPER_RIFLE_CLIP_AP: "BlackOps Sniper Mag / AP"
  STR_BO_SNIPER_RIFLE_CLIP_AA: "BlackOps Sniper Mag / AP"
  STR_BO_SNIPER_RIFLE_UFOPEDIA: "A well-balanced sniper rifle. Accurate and relatively powerful at long range."

  STR_BO_HEAVY_SNIPER_RIFLE: "Heavy Sniper Rifle"
  STR_BO_HEAVY_SNIPER_RIFLE_CLIP: "Heavy BlackOps Sniper Mag"
  STR_BO_HEAVY_SNIPER_RIFLE_CLIP_AP: "Heavy BlackOps Sniper Mag / AP"
  STR_BO_HEAVY_SNIPER_RIFLE_CLIP_AA: "Heavy BlackOps Sniper Mag / AP"
  STR_BO_HEAVY_SNIPER_RIFLE_UFOPEDIA: "Used by elite Syndicate units, this large-caliber sniper rifle is packed with expensive electronics to assist the shooter."

  STR_RIFLE_M16: "M16 Rifle"
  STR_RIFLE_M16_UFOPEDIA: "Used by militaries worldwide before the war. Now it's outdated and more of a collector's item than a service rifle."

  STR_RIFLE_VHS: "VHS Rifle"
  STR_RIFLE_VHS_UFOPEDIA: "French bullpup rifle."

  STR_RIFLE_M16_SCARFACE: "Advanced Scarface M16"
  STR_RIFLE_M16_SCARFACE_UFOPEDIA: "Smugglers' little friend. Despite their usual distrust of alien tech, this gun is equipped with sensors and an optronic sight. Plastisteel construction increases fire rate, and the underbarrel grenade launcher is perfect for delicate situations."

  STR_RIFLE_GL_M16: "M16 Underbarrel Grenade Launcher"
  STR_RIFLE_GL_M16_UFOPEDIA: "Underbarrel grenade launcher from the smuggler rifle. Uses standard 40mm grenades."

  STR_SMARTRIFLE: "Smart Rifle"
  STR_SMARTRIFLE_UFOPEDIA: "This magnificent rifle has a built-in optronic computer and homing module that assists with aiming. High fire rate dramatically increases its lethality."
  STR_SMARTRIFLE_CLIP: "Smart Rifle Mag"
  STR_SMARTRIFLE_CLIP_AA: "Smart Rifle Mag / AP"

  STR_FLARE_PISTOL: "Flare Pistol"
  STR_FLARE_PISTOL_UFOPEDIA: "Simple single-shot pistol. Fires signal flares for distress calls… OR for illuminating and igniting the area. Hard to believe that after almost 300 years the design has barely changed."
  STR_FLARE_PISTOL_CLIP: "Flare Pistol Rocket"
  STR_FLARE_PISTOL_SUPER_CLIP: "Heavy Flare Pistol Rocket"

  STR_TASER: "Taser"
  STR_TASER_CLIP: "Taser Cartridge"
  STR_TASER_SUPER_CLIP: "Ultra Taser Cartridge"
  STR_TASER_UFOPEDIA: "Non-lethal device capable of disabling lightly armored thugs."

  STR_SCOPED_HUNTING_RIFLE: "Scoped Hunting Rifle"
  STR_SCOPED_HUNTING_RIFLE_UFOPEDIA: "Polished hunting rifle with a quality optical scope."

  STR_COWRIFLE: "Lever-Action Rifle"
  STR_COWRIFLE_UFOPEDIA: "Quite an interesting rifle for the Wastes. Features a tubular magazine. A skilled and quick shooter can empty almost the entire magazine in one burst!"
  STR_COWRIFLE_AMMO: "Lever-Action Rifle Ammo"
  STR_COWRIFLE_AMMO_AA: "Lever-Action Rifle Ammo / AP"

  STR_OICW: "OICW Rifle"
  STR_OICW_UFOPEDIA: "Even before World War III, this rifle's design was too complex for mass production. However, its high accuracy and integrated grenade launcher make it versatile in almost any combat situation."

# WEAPONS - SMGs
  STR_MICRO_UZI: "Uzi"
  STR_UZI_CLIP: "Uzi Mag"
  STR_MICRO_UZI_UFOPEDIA: "This weapon was a real hit among submachine guns in pre-war times. The stock allows the shooter to fire accurately."

  STR_SMG_10MM: "Bandit SMG"
  STR_SMG_10MM_UFOPEDIA: "A widely loved 10mm submachine gun among Wastelanders. Heavy, but reasonably practical."
  STR_SMG_10MM_CLIP: "10mm SMG Mag"
  STR_SMG_10MM_CLIP_AA: "10mm SMG Mag / AP"

  STR_FN_P90_NEO: "P90 Neo"
  STR_FN_P90_NEO_CLIP: "P90 Mag"
  STR_FN_P90_NEO_UFOPEDIA: "Submachine gun. Very cute."

  STR_MAC12: "MAC12 & C.E.S."
  STR_MAC12_UFOPEDIA: "MAC12 submachine gun with an illegal modification (Calculating Enhance System) that gives the shooter much better control during long bursts. The powerful .45 caliber is the cherry on top, though the effective range leaves a lot to be desired."
  STR_MAC12_CLIP: "MAC12 Magazine"
  STR_MAC12_AP_CLIP: "MAC12 Magazine / AP"

  STR_MILITECH_SMG: "MiliTech SMG"
  STR_MILITECH_SMG_CLIP: "MiliTech SMG Mag"
  STR_MILITECH_SMG_AA_CLIP: "MiliTech SMG Mag / AP"
  STR_MILITECH_SMG_UFOPEDIA: "MiliTech submachine gun. Good armor penetration. Deadly in the hands of an experienced operative."

  STR_SMG_SMARTLOCK: "Smartlock SMG"
  STR_SMG_SMARTLOCK_UFOPEDIA: "An SMG packed with optronics and a specially tuned AI to assist with shooting — even for complete amateurs. The downside is that it fires small-caliber 9x19mm rounds, which reduces its lethality."
  STR_SMG_SMARTLOCK_CLIP: "Smartlock Magazine"
  STR_SMG_SMARTLOCK_CLIP_EMP: "Smartlock Magazine / EMP"

# WEAPONS - RIFLES
  STR_RIFLE_AK: "Kalashnikov"
  STR_RIFLE_AK_UFOPEDIA: "This rusty, barely-held-together assault rifle still hits hard, even if it isn't very accurate."
  STR_RIFLE_AK_CLIP: "Assault Rifle Magazine"

  STR_M52S_AJAX_RIFLE: "M52S-AJAX Rifle"
  STR_M52S_AJAX_RIFLE_CLIP: "M52S-AJAX Mag"
  STR_M52S_AJAX_RIFLE_UFOPEDIA: "An elegant assault rifle popular among armed forces and private police units worldwide. Smooth trigger and collimator sight provide nearly perfect fire control."

  STR_BATTLE_RIFLE: "Battle Rifle"
  STR_BATTLE_RIFLE_CLIP: "Battle Rifle Mag"
  STR_BATTLE_RIFLE_CLIP_AP: "Battle Rifle Mag / AP"
  STR_BATTLE_RIFLE_CLIP_PS: "Battle Rifle Mag / PS"
  STR_BATTLE_RIFLE_UFOPEDIA: "The trusted friend of frontier marines, this heavy military-grade rifle has spread into the hands of billions of colonists. Burst fire accuracy is terrible, but single shots are quite precise for its class."

  STR_BANDIT_RIFLE: "Bandit Rifle"
  STR_BANDIT_RIFLE_UFOPEDIA: "A well-made rifle, perfect for raiding caravans."
  STR_BANDIT_RIFLE_CLIP: "Bandit Rifle Mag"
  STR_BANDIT_RIFLE_CLIP_AP: "Bandit Rifle Mag / AP"

  STR_LAS_RIFLE_SCAV: "Scavenger Lasgun"
  STR_LAS_RIFLE_SCAV_UFOPEDIA: "A primitive laser rifle assembled by Wasteland junkers. Powered by a small nuclear battery good for 8 shots."
  STR_LAS_RIFLE_SCAV_ADV: "Advanced Scavenger Lasgun"
  STR_LAS_RIFLE_SCAV_ADV_UFOPEDIA: "Upgraded Scavenger lasgun with fancy features."
  STR_LAS_RIFLE_SCAV_CLIP: "Scavenger Lasgun Battery"
  STR_LAS_RIFLE_SCAV_SUPER_CLIP: "Super Scavenger Lasgun Battery"

  STR_MIL_PLASMA_RIFLE: "Nova Plasma Rifle"
  STR_MIL_PLASMA_RIFLE_UFOPEDIA: "Military-grade plasma rifle. Based on alien designs but in an extremely simplified form. Rate of fire and range have noticeably decreased."
  STR_MIL_PLASMA_RIFLE_CLIP: "Nova Battery"

# WEAPONS - SNIPER RIFLES
  STR_PIPERIFLE: "Pipe Rifle"
  STR_PIPERIFLE_UFOPEDIA: "This piece of junk fires armor-piercing rounds and, surprisingly, is quite accurate."

  STR_SNIPER_RIFLE_LT: "Light Sniper Rifle"
  STR_SNIPER_RIFLE_LT_UFOPEDIA: "A lightweight sniper rifle with a 7-round magazine. Easy to handle — just keep your distance. Used by military police during riots."
  STR_SNIPER_RIFLE_LT_CLIP: "Light Sniper Mag"

  STR_MSR770: "MSR-770 Rifle"
  STR_MSR770_CLIP: "MSR-770 Mag"
  STR_MSR770_BIG_CLIP: "Large MSR-770 Mag"
  STR_MSR770_UFOPEDIA: "Signature weapon of the Russian Federation Air Force. Based on the Russian SKS, this rifle features a polymer frame with plastisteel parts and a fancy optronic sight. Large magazines reduce accuracy by 20% (because the magazine blocks the sight... what idiot put the magazine on top of the scope?!)."

  STR_ASSAULT_AUTO_SNIPER_RIFLE: "Smart Auto-Sniper"
  STR_ASSAULT_AUTO_SNIPER_RIFLE_UFOPEDIA: "The pinnacle of our weapons engineering. Extremely accurate, has full-auto mode, and an integrated AI targeting system makes this weapon truly lethal. Damage and accuracy heavily depend on the shooter's skill and reflexes."
  STR_ASSAULT_AUTO_SNIPER_RIFLE_CLIP: "Auto-Sniper Mag"
  STR_ASSAULT_AUTO_SNIPER_RIFLE_PS_CLIP: "Auto-Sniper Mag / PS"

  STR_NITRO_EXPRESS_BUY: "Purchase Nitro Express Rifle"
  STR_NITRO_EXPRESS: "Nitro Express"
  STR_NITRO_EXPRESS_UFOPEDIA: "Rifle chambered in .700 H&H Nitro Express. Usually used by Wasteland hunters to take down particularly thick mutants. Monstrous recoil."

  STR_SNIPER_RIFLE: "Sniper Rifle"
  STR_SNIPER_RIFLE_CLIP: "Sniper Rifle Mag"
  STR_SNIPER_RIFLE_CLIP_AP: "Sniper Rifle Mag / AP"
  STR_SNIPER_RIFLE_CLIP_PS: "Sniper Rifle Mag / PS"
  STR_SNIPER_RIFLE_UFOPEDIA: "The perfect choice for long-range combat. However, it is not recommended to give this weapon to inexperienced operatives."

  # WEAPONS - SHOTGUNS
  STR_SMART_SAWNOFF: "Smart Sawed-Off"
  STR_SMART_SAWNOFF_UFOPEDIA: "The result of our long and hard work in shotguns and electronics. A gyroscopic stabilizer combined with computerized internals makes it deadly at close range."

  STR_SMART_SAWNOFF_STOCK: "Smart Sawed-Off (Stock)"
  STR_SMART_SAWNOFF_STOCK_UFOPEDIA: "The added stock allows our mini-shotgun to shoot more accurately and at longer range, at the cost of a slight drop in rate of fire. Reloading takes a bit longer (12 TU)."

  STR_SMALL_SHOTGUN: "Compact Shotgun"
  STR_SMALL_SHOTGUN_SHELLS: "Small Shotgun Shells"
  STR_SMALL_SHOTGUN_SHELLS_SLUG: "Small Slug"
  STR_SMALL_SHOTGUN_UFOPEDIA: "A compact pump-action shotgun produced by Ryder Arms. Its range isn't great, but it can be easily concealed under clothing."

  STR_DOMESTIC_SHOTGUN: "Civilian Shotgun"
  STR_DOMESTIC_SHOTGUN_UFOPEDIA: "A simple civilian pump-action shotgun. The only real advantage of this piece of scrap metal is some{NEWLINE}decent range. Uses small buckshot and slugs."

  STR_SHOTGUN: "Shotgun"
  STR_SHOTGUN_UFOPEDIA: "Standard pump-action shotgun manufactured by Ryder Arms."

  STR_CHROME_SHOTGUN: "Chrome Shotgun"
  STR_CHROME_SHOTGUN_UFOPEDIA: "A skillfully assembled old-model pump-action shotgun."

  STR_SHOTGUN_ACQUISITION: "Purchase: Shotgun"
  STR_SCOPED_MAGNUM_ACQUISITION: "Purchase: Scoped Magnum"

  STR_BLACKOPS_SHOTGUN: "BlackOps Shotgun"
  STR_SHOTGUN_SHELLS: "Shotgun Shells"
  STR_SHOTGUN_SHELLS_BS: "Shotgun Shells / AP"
  STR_SHOTGUN_SHELLS_BATON: "Shotgun Shells / Rubber"
  STR_SHOTGUN_SHELLS_ZAP: "Shotgun Shells / Shock"
  STR_SHOTGUN_AA_SHELLS_BS: "Shotgun PS Shells / AP"
  STR_SHOTGUN_AA_SHELLS: "Shotgun PS Shells"
  STR_BLACKOPS_SHOTGUN_UFOPEDIA: "This shotgun variant has a slightly faster rate of fire than other pump-action models."

  STR_BLACKOPS_SUPERSHOTGUN: "BlackOps Super Shotgun"
  STR_BLACKOPS_SUPERSHOTGUN_UFOPEDIA: "One of the craziest shotguns around. The built-in magazine feeds shells to two barrels at once. The weapon is equipped with a full suite of electronic sensors and sights that improve rate of fire and effective range."

  STR_BLACKOPS_TACTICOOL_SHOTGUN: "BlackOps Auto Shotgun"
  STR_BLACKOPS_TACTICOOL_SHOTGUN_DRUM: "BlackOps Auto Shotgun Drum"
  STR_BLACKOPS_TACTICOOL_SHOTGUN_DRUM_AA: "BlackOps Auto Shotgun Drum (PS)"
  STR_BLACKOPS_TACTICOOL_SHOTGUN_DRUM_BIG: "Large BlackOps Auto Shotgun Drum"
  STR_BLACKOPS_TACTICOOL_SHOTGUN_DRUM_BIG_AA: "Large BlackOps Auto Shotgun Drum (PS)"
  STR_BLACKOPS_TACTICOOL_SHOTGUN_UFOPEDIA: "This shotgun is perfect for breaching enemy positions thanks to its full-auto mode. For prolonged fun it supports drum magazines."

  STR_OGRE_SHOTGUN: "O.R.C. Shotgun"
  STR_OGRE_SHOTGUN_SHELLS: "O.R.C. Shells"
  STR_OGRE_SHOTGUN_UFOPEDIA: "A monstrously heavy double-barrel shotgun that fires devastating heavy buckshot."

  STR_DEBUGUN: "Debug Gun"
  STR_DEBUGUN_CLIP: "Debug Gun Ammo"
  STR_DEBUGUN_UFOPEDIA: "An excellent choice when defending your small establishment from living pizza.{NEWLINE}{NEWLINE}{NEWLINE}If you're reading this, you're most likely a Developer... Or a cheater :^)"

  STR_SHOTGUN_STREETCLEANER: "Street Cleaner Shotgun"
  STR_STREETCLEANER_CLIP1: "Street Cleaner Shotgun Mag"
  STR_STREETCLEANER_CLIP2: "Street Cleaner Shotgun Mag / TT"
  STR_STREETCLEANER_UFOPEDIA: "Bullpup combat shotgun. Allows rapid burst fire."

  STR_AUTOSHOTGUN1: "Boar Shotgun"
  STR_AUTOSHOTGUN1_UFOPEDIA: "A heavy automatic bullpup shotgun."
  STR_AUTOSHOTGUN1_CLIP1: "Boar Drum"
  STR_AUTOSHOTGUN1_CLIP2: "Boar Drum / AP"

  STR_OL_WINCHESTER: "Lever-Action Shotgun"
  STR_OL_WINCHESTER_UFOPEDIA: "A true Wasteland classic! Popularized by pre-war cyborg movies, this lever-action shotgun has a fast rate of fire, though its range is limited."

  STR_DOUBLE_BARRELE_SHOTGUN: "Double-Barreled Shotgun"
  STR_DOUBLE_BARRELE_UFOPEDIA: "A primitive double-barrel shotgun with decent range."

  STR_CRUSHER_SHOTGUN: "Crusher Shotgun"
  STR_CRUSHER_SHOTGUN_CLIP1: "Crusher Mag / Buckshot"
  STR_CRUSHER_SHOTGUN_CLIP2: "Crusher Mag / Slug"
  STR_CRUSHER_SHOTGUN_UFOPEDIA: "Stylish, fashionable shotgun for posers."

# WEAPONS - HMG
  STR_M60: "M60 Machine Gun"
  STR_M60_CLIP_SMALL: "M60 Belt"
  STR_M60_CLIP_BIG: "M60 Ammo Box"
  STR_M60_UFOPEDIA: "An ancient but well-made 7.62mm machine gun. It was a solid support weapon until the 24th century, when it became outdated compared to newer models."

  STR_SAW: "Assault Machine Gun"
  STR_SAW_UFOPEDIA: "A rifle modified for situations where suppressive fire is needed."
  STR_SAW_CLIP: "Assault MG Mag"
  STR_SAW_CLIP_AP: "Assault MG Mag / AP"

# WEAPONS - MINIGUNS
  STR_MINIGUN_1: "Assault Minigun"
  STR_MINIGUN_1_AMMO: "Assault Minigun Drum"
  STR_MINIGUN_1_UFOPEDIA: "A relatively compact minigun. Light enough to be fired from the hip."

  STR_MINIGUN_2: "Heavy Minigun"
  STR_MINIGUN_2_AMMO: "Minigun Ammo Box"
  STR_MINIGUN_2_UFOPEDIA: "A big gun with a rotating barrel assembly. Heavy and not very accurate, but it generously showers a good portion of the battlefield with molten lead. Good against armor."

  STR_GATLING_LASER: "Gatling Laser"
  STR_GATLING_LASER_UFOPEDIA: "The name says it all. A heavy laser minigun powered by an endless turbo-nuclear energy source."

  STR_MINING_LASER: "Mining Laser"
  STR_MINING_LASER_UFOPEDIA: "This beast is normally used by colonial miners to cut through hard rock."

# WEAPONS - FLAMETHROWERS
  STR_FLAMETHROWER_DIY: "DIY Flamethrower"
  STR_FLAMETHROWER_DIY_UFOPEDIA: "A gun assembled from various pipes and scrap metal capable of spraying fire and flames."

  STR_FLAMETHROWER: "Combat Flamethrower"
  STR_FLAMETHROWER_UFOPEDIA: "Heavy military-grade flamethrower. High rate of fire but limited range."
  STR_FLAMETHROWER_CLIP: "Fuel Canister"

# WEAPONS - ROCKET LAUNCHERS
  STR_SSRL: "OPTO"
  STR_SSRL_UFOPEDIA: "Single-shot Anti-Tank Weapon. A disposable anti-tank grenade launcher. As the name suggests, it's excellent against armored vehicles."

  STR_GEP_GUN: "URSA Launcher"
  STR_GEP_GUN_UFOPEDIA: "Reusable Laser-Guided Rocket System, or simply URSA. This launcher can fire rockets along a primitive guided trajectory (maximum 2 waypoints)."

  STR_GEP_GUN_ROCKET_1: "URSA Launcher Pack"
  STR_GEP_GUN_ROCKET_2: "URSA Launcher Pack / Incendiary"

  STR_M202_FLASH: "M202 Flash"
  STR_M202_FLASH_PACK: "M202 Rockets"

  STR_RPG: "RPG"
  STR_RPG_UFOPEDIA: "Light rocket launcher that uses several types of rockets. High-explosive rockets have a large blast radius, while armor-piercing ones penetrate protected vehicles well, but have a smaller explosion radius."

  STR_SMALL_ROCKET_RPG: "High-Explosive Rocket"
  STR_SMALL_ROCKET_ADV: "Armor-Piercing Rocket"
  STR_SMALL_ROCKET_FAE: "Incendiary Rocket"

# WEAPONS - GRENADE LAUNCHERS
  STR_GRENADE_LAUNCHER: "Old Grenade Launcher"
  STR_GRENADE_LAUNCHER_UFOPEDIA: "A worn-out and poorly assembled grenade launcher. Allows firing projectiles along a high-arcing trajectory."

  STR_GRENADE_LAUNCHER_VICE: "Grenade Launcher"
  STR_GRENADE_LAUNCHER_VICE_UFOPEDIA: "Modernized grenade launcher with improved accuracy and blast radius."

  STR_GL_HE: "High-Explosive Grenade"
  STR_GL_INCENDIARY: "Incendiary Grenade"
  STR_GL_SMOKE: "Smoke Grenade"

# MEDICAL SUPPLIES
  STR_STIMM: "Stimulant"
  STR_STIMM_UFOPEDIA: "This injector contains a stimulating substance that can get a person back on their feet and restore consciousness. Restores 50 TU and removes 25 stun."

  STR_MEDIPACK_SMALL: "Small Medipack"
  STR_MEDIPACK_SMALL_UFOPEDIA: "A device containing a small amount of medication for treating wounds on the battlefield. Enough for 2 uses (each wound treatment restores 2 HP). Also contains 2 doses of painkillers (restores lost morale from injuries) and 2 powerful stimulant injections (each removes 25 stun).{NEWLINE}Self-treatment is not possible."

  STR_MEDIPACK_MID: "Medipack"
  STR_MEDIPACK_MID_UFOPEDIA: "A pack with advanced medication containing a wider range of drugs.{NEWLINE}Self-treatment is not possible."

  STR_SMALL_MEDKIT: "Small First Aid Kit"
  STR_SMALL_MEDKIT_UFOPEDIA: "A small first aid kit with basic supplies for treating battlefield wounds. To use it, stand face-to-face with the operative who needs treatment."

  STR_MEDI_PATCH: "Medi-Patch"
  STR_MEDI_PATCH_UFOPEDIA: "Special-purpose patch from MedTek. When applied to a wound, it delivers a complex of chemicals that stops bleeding. Can be used on yourself."

  STR_ADV_MEDIPACK: "Advanced Medipack"
  STR_ADV_MEDIPACK_UFOPEDIA: "A device packed with various tools for treating gunshot wounds and energy weapon burns."

  STR_GOLDEN_DRAGONS: "Golden Dragon Cigarettes"
  STR_GOLDEN_DRAGONS_UFOPEDIA: "Cigarettes from the popular Golden Dragon brand."

  STR_PIZZA_SLICE: "Slice of Pizza"
  STR_PIZZA_SLICE_UFOPEDIA: "Cheese, pepperoni, tomato sauce, a bit of oregano seasoning and... an unknown dough composition. This mysterious gift was delivered right to our base entrance, which is concerning — someone knows the location of our base! But who the hell would deliver pizza to the middle of nowhere in the Wastes? The only comforting thought is that even in this era of synthetic slop, there are still real chefs using natural ingredients."

# MISC EQUIPMENT
  STR_PEPPER_GUN: "Pepper Gun"
  STR_PEPPER_GUN_UFOPEDIA: "In these hard times not everyone can get a firearms license, so some civilians use this non-lethal device filled with pepper spray. On hit it reduces TU and deals stun damage to the target."

  STR_PAPER_FLARE: "Paper Flare"
  STR_PAPER_FLARE_UFOPEDIA: "A paper flare that illuminates the area for a short time (3 turns), after which it becomes useless. Just open the cap and pull the pin!{NEWLINE}{NEWLINE}WARNING: Once activated, it cannot be turned off."

  STR_FLASHLIGHT: "Flashlight"
  STR_FLASHLIGHT_UFOPEDIA: "A device powered by an Elerium battery that illuminates the surrounding area. Be careful when turning it on at night — enemies might see you and open fire."

  STR_FIRE_EXTINGUISHER: "Fire Extinguisher"
  STR_FIRE_EXTINGUISHER_UFOPEDIA: "A canister with powder foam for extinguishing fires. It also deals 32 stun damage and removes the same amount of TU. Can also be used to bash someone over the head. Our Occupational Safety inspector *strongly* insists we keep this on hand."

  STR_CYBERDECK_BEGGINER: "Cyberdeck"
  STR_CYBERDECK_BEGGINER_UFOPEDIA: "A device that allows dealing EMP damage. Effectiveness heavily depends on the operative's skill."

# GRENADES
  STR_MOLOTOV: "Molotov Cocktail"
  STR_MOLOTOV_UFOPEDIA: "The anarchists' favorite drink. Just light and throw!{NEWLINE}{NEWLINE}Range: {ALT}20{ALT}"

  STR_PIPEBOMB: "Pipe Bomb"
  STR_PIPEBOMB_UFOPEDIA: "This bomb was made from scrap materials scavenged in the Wastes. Mostly used by raiders, rebels, and other anarchists."

  STR_GAS_GRENADE: "Gas Grenade"
  STR_GAS_GRENADE_UFOPEDIA: "Upon detonation it releases a caustic gas that causes poisoning and death when inhaled. Better wear gas masks against this crap."

  STR_EMP_GRENADE: "EMP Grenade"
  STR_EMP_GRENADE_UFOPEDIA: "A small device that emits a powerful electromagnetic pulse upon detonation."

  STR_NITRO_GRENADE: "Nitro Pack"
  STR_NITRO_GRENADE_UFOPEDIA: "This small explosive has a truly bombastic charge that can vaporize even a corpse."

# MINES
  STR_MINE: "Mine"
  STR_MINE_UFOPEDIA: "Anti-personnel sensor mine. As the name suggests, it's effective against ground infantry. The sensor triggers when anything moves in an adjacent tile (tiles above or below are ignored).{NEWLINE}{NEWLINE}The upward-directed blast wave covers 2 tiles and the explosion ignores 20% of armor. So be extremely careful when placing mines.{NEWLINE}{NEWLINE}Throw Accuracy: {ALT}50%{ALT}"

  STR_SATCHEL_CHARGE: "Satchel Charge"
  STR_SATCHEL_CHARGE_UFOPEDIA: "Quite a powerful explosive. Mostly used by colonial miners to blast through ultra-hard rock."

  # MISC ITEMS

# Cash & Valuables
  STR_MONEY_BRIEFCASE: "Briefcase of Money"
  STR_MONEY_BRIEFCASE_UFOPEDIA: "Some of our clients don't trust financial systems and bank transfers, so they sometimes demand cash directly. This briefcase contains {ALT}100,000{ALT} credits.{NEWLINE}With some luck, we might find such briefcases during missions."

  STR_MONEY_BAG: "Bag of Money"
  STR_MONEY_BAG_UFOPEDIA: "Some of our clients don't trust financial systems and bank transfers, so they sometimes demand cash directly. This bag contains {ALT}500,000{ALT} credits.{NEWLINE}With some luck, we might find such bags during missions."

  STR_WAD_O_CASH: "Wad of Cash"
  STR_WAD_O_CASH_UFOPEDIA: "Some of our clients don't trust financial systems and bank transfers, so they sometimes demand cash directly. This wad contains {ALT}50,000{ALT} credits.{NEWLINE}With some luck, we might find such wads during missions."

# Insurance Contracts
  STR_INSURANCE_CONTRACT: "Insurance Contract"
  STR_INSURANCE_CONTRACT_UFOPEDIA: "When we capture stolen civilian hovercars, we receive these contracts. As private police and a PMC, we can return the vehicle to its rightful owner for a good reward...{NEWLINE}...Or disassemble the junker for parts and power cells to use for our own purposes. Keep in mind that such actions damage our reputation. [-100 Reputation per broken contract]"

  STR_INS_CONTRACT_DISASSAMBLE: "Insurance Contract: Disassemble Aircar"

# Data Loot
  STR_FLASHDRIVE_RAIDERS: "Raiders Data Drive"
  STR_FLASHDRIVE_RAIDERS_UFOPEDIA: "Besides porn and raider convoy route plans, this old drive surprisingly contains a lot of useful data. Various power schematics for bunkers, blueprints for laser and plasma weapons, and who knows what else the Raiders managed to copy during their raids.{NEWLINE}{NEWLINE}After digging deeper, we discovered there are even larger military bunkers out there. If we ask the right Wastelanders, we might locate these sites and help ourselves to pre-war treasures."

# Lootboxes & Containers
  STR_EXTRACTION: "Extraction"

  STR_WEAPON_LOOTBOX_CHEAP: "Worn Weapon Crate"
  STR_WEAPON_LOOTBOX_CHEAP_UFOPEDIA: "A rotting weapon storage crate. Raiders and Wasteland gunsmiths usually use them to transport guns for scrapping, but sometimes you can find brand new weapons inside."
  STR_WEAPON_LOOTBOX_CHEAP_EX: "Open: Worn Weapon Crate"

  STR_LOOTBOX6: "Military Container"
  STR_LOOTBOX6_UFOPEDIA: "A tough, brutal-looking box. These containers usually carry pretty decent military equipment."
  STR_LOOTBOX6_EX: "Open: Military Container"

  STR_LOOTBOX7: "Reinforced Container"
  STR_LOOTBOX7_UFOPEDIA: "Contains equipment for colonists."

  STR_SYNDICATE_SUPBOX: "Syndicate Supply Crate"
  STR_SYNDICATE_SUPBOX_UFOPEDIA: "A rather spacious crate full of various useful junk that the Syndicate transports for their shady purposes. We can help ourselves to whatever we pry from their cold, dead hands."

  STR_AUG_CONTAINTER_1: "Old Implant Container"
  STR_AUG_CONTAINTER_1_UFOPEDIA: "A rusty canister with old, second-rate implants. Usually full of cheap consumer-grade junk that's better off as scrap, but we can refurbish this garbage and use it as a base for future implant upgrades."
  STR_AUG_CONTAINTER_1_EX: "Open: Old Implant Container"

  STR_AUG_CONTAINTER_2: "Implant Container"
  STR_AUG_CONTAINTER_2_UFOPEDIA: "Container with fairly decent cyber implants. Can yield some good equipment."
  STR_AUG_CONTAINTER_2_EX: "Open: Implant Container"

  STR_AUG_CONTAINTER_3: "Reinforced Implant Container"
  STR_AUG_CONTAINTER_3_UFOPEDIA: "What a find! Just the container itself is worth a fortune. The hardware inside must be top-tier!"
  STR_AUG_CONTAINTER_3_EX: "Open: Reinforced Implant Container"

# Turrets
  STR_DEPLOY_SENTRY_TURRET_MK1: "Portable Turret Mk1"
  STR_DEPLOY_SENTRY_TURRET_MK1_UFOPEDIA: "The colonial marine's best friend. This portable 5.7mm turret provides extra firepower to your squad. The container is heavy and deploying the turret to full readiness takes time (1 full turn)."

  STR_CORPSE_SENTRY_TURRET_MK1: "Turret Wreckage"
  STR_SENTRY_TURRET_MK1: "Sentry Turret Mk1"
  STR_SENTRY_TURRET_MK1_ARMOR: "Sentry Turret Mk1"
  AUX_SENTRY_TURRET_GUN: "5.7mm Gun"

  STR_CORPSE_OLD_TURRET_MINIGUN: "Sentry Turret Wreckage"

# Other
  STR_SAVAGE_CRAFT: "SAVAGE"
  STR_SAVAGE_UFOPEDIA: "An old military troop transport from the Mega Primus War era. Can carry a large number of soldiers, but fuel costs are significant." 

  STR_WRECKED_SAVAGE_CRAFT: "Wrecked Savage Hull"
  STR_WRECKED_SAVAGE: "Study Savage Hull"
  STR_WRECKED_SAVAGE_UFOPEDIA: "This old bucket of bolts gathering dust in our hangar is a pre-war military transport of the 'Savage' class. We could just scrap it and stop wasting time, but with some work we might get this bird back in the air. Just keep in mind — this thing guzzles compressed elerium, which we currently have very little of, and it's hard to find suppliers."

# FACTIONS
  STR_FACTIONS_UC: "FACTIONS & OTHER"
  STR_FAC_RAIDERS_RIPPERS: "Raider Clan - Rippers"
  STR_FAC_RAIDERS_RIPPERS_UPED: "Raider Clan - Rippers"
  STR_FAC_RAIDERS_RIPPERS_UFOPEDIA: "The Rippers are one of many bandit groups roaming the Wastes. They mostly consist of societal rejects and even some recruited Megaprim citizens. In essence, the Rippers are a semi-military organization with anarchist tendencies, as they often lack a single leader overseeing their activities. They engage in looting, raiding private farms, and occasional attacks on corporate hovercar transports."

  # MEGAPOL
  STR_MEGAPOL_COP: "Megapol Cop"

  # SMUGGLERS
  STR_SMUGLERS_GUNS: "Smuggler Weapons"
  STR_SMUGLERS_GUNS_UFOPEDIA: "After questioning some members and examining their weapons, we found that smugglers use old but well-made pre-war firearms, most likely 3D-printed. If we can track down the source, we could obtain the schematics and blueprints for producing these guns."

  STR_SMUGLERS: "Smugglers"
  STR_SMUGLER: "Smuggler"
  STR_FAC_SMUGLERS: "Faction - Smugglers"
  STR_FAC_SMUGLERS_UFOPEDIA: "One of the branches of Earth's mafia, specializing in the illegal transportation of drugs, weapons, and various goods across the planet. Their groups consist of desperate people tired of boring megacity life. Despite their ridiculous outfits, these guys are determined, brave, and well-armed. Smugglers avoid elerium-powered engines, making them difficult to track."

  STR_SMUGLERS_BELIVES: "Smuggler Ideals"
  STR_SMUGLERS_BELIVES_UFOPEDIA: "Blah-blah something about Miami Police and pre-war lifestyle."

  # BIKERS
  STR_BIKERS: "Bikers"
  STR_BIKERS_UFOPEDIA: "A group of anarchists who refuse to follow any rules or laws. They mostly travel in small packs across the Wastes, occasionally visiting Megaprims to resupply or cause trouble in local bars."

  # RIPPER RAIDERS
  STR_WST_RIPPER_RACE: "Rippers"
  STR_WST_RIPPER03: "Ripper Scout"
  STR_WST_RIPPER03_ARMOUR: "Ripper Scout: Analysis"

  # TERRORISTS - SiN
  STR_FAC_SIN_UFOPEDIA: "SiN"
  STR_FAC_SIN_UFOPEDIA_UFOPEDIA: "A terrorist organization despised by everyone, yet secretly supported by many megacorporations. In addition to producing cringy recruitment videos to brainwash Wasteland youth, they engage in robberies and assassinations targeting megacity citizens and Earth governments. Their structure resembles a private military company more than a gathering of freedom fighters, as recruitment into higher ranks is extremely strict and brutal."

  STR_TERRORIST_SIN_1: "SiN Soldier"
  STR_TERRORIST_SIN_2: "SiN Scout"
  STR_TERRORIST_SIN_3: "SiN Instructor"
  STR_TERRORIST_SIN_4: "SiN Lieutenant"

# BASE MODULES / FACILITIES
  STR_ACCESS_LIFT_UFOPEDIA: "The foundation of any base. This is where personnel and equipment are delivered straight underground. Unfortunately, it is a vulnerable part of our base, as we cannot fully secure the surface entrance. Provides {ALT}25{ALT} units of storage space.{NEWLINE}Rest: 1"

  STR_LIVING_QUARTERS_UFOPEDIA: "Our base personnel — scientists, engineers, and operatives — live and rest here. Each module accommodates {ALT}35{ALT} people.{NEWLINE}Rest: 2"

  STR_PRISON_CELLS: "Prison Cells"
  STR_PRISON_CELLS_UFOPEDIA: "All sorts of idiots and scum we manage to capture alive end up here. Designed for 12 occupants."

  STR_GYM: "Gym"
  STR_GYM_UFOPEDIA: "This module is equipped for training our agents. Designed for 8 operatives."

  STR_MEDBAY: "Medical Bay"
  STR_MEDBAY_UFOPEDIA: "The medical bay allows us to hospitalize our operatives on-site, significantly reducing recovery time. It also includes equipment and a fixer who can perform cybernetic augmentations on our agents."

  STR_ADVANCED_MEDBAY: "Advanced Medical Bay"
  STR_ADVANCED_MEDBAY_UFOPEDIA: "More features, more toys. Recovery time is further reduced thanks to superior equipment. The fixer can also perform advanced augmentations."

  STR_CORRIDOR: "Corridor"
  STR_CORRIDOR_UFOPEDIA: "A corridor for corridor-ing corridors. Can be built over to speed up construction of new modules."

  STR_BIG_LIVING_QUARTERS: "Large Living Quarters"
  STR_BIG_LIVING_QUARTERS_UFOPEDIA: "A spacious module designed for 185 people. Efficiently saves space and includes a small storage area ({ALT}50{ALT} units).{NEWLINE}Rest: 4"

  STR_HQ: "Headquarters"
  STR_HQ_UFOPEDIA: "This module processes client requests. It is also equipped with a basic radar and a small laboratory for 10 people, where basic research or interrogations can be conducted."

  STR_RECREATION_ROOM: "Recreation Room"
  STR_RECREATION_ROOM_UFOPEDIA: "A small area with a minibar, arcade machines, and a cafeteria — everything for our operatives to relax between missions. Includes a small storage closet ({ALT}+10{ALT} storage). Generates {ALT}15,000{ALT} credits in passive monthly income.{NEWLINE}Rest: 8"

  STR_POWER_PLANT: "Power Plant"
  STR_POWER_PLANT_UFOPEDIA: "A small power station required for some base facilities. Extremely expensive to build, but once completed it generates income by selling excess power to nearby settlements.{NEWLINE}Requires 2 Core Engines to build."

  STR_ALLOY_FACTORY: "Alloy Factory"
  STR_ALLOY_FACTORY_UFOPEDIA: "With the necessary blueprints and knowledge, we can now produce alloys ourselves without depending on suppliers or battlefield loot. This module is equipped with all necessary tools for manufacturing plastisteel. It is also required for producing more precise plastisteel components. Requires Power Plant. Provides 20 workspaces."

  STR_ROBOT_WORKSHOP: "Robot Workshop"
  STR_ROBOT_WORKSHOP_UFOPEDIA: "This section is equipped with everything needed to manufacture drones, load simple AIs into central processors, and assemble our own robots and combat platforms! Requires Power Plant. Provides 80 workspaces."

  STR_COMM_CENTER: "Communications Center"
  STR_COMM_CENTER_UFOPEDIA: "A useful module for accessing the Hypernet and establishing contacts. We can also process additional jobs and contracts from our employers here. Provides 5 scientist workspaces.{NEWLINE}Requires Power Plant. Only one per base."

  STR_SCIENCE_CENTER: "Science Center"
  STR_SCIENCE_CENTER_UFOPEDIA: "A large complex where up to 30 scientists can work on developing equipment and other useful gadgets. Equipped with a state-of-the-art bio-lab, high-speed data processing hardware, and access to military research databases. The cherry on top is a small medical section that reduces wounded operatives' recovery time.{NEWLINE}Only one per base."

  STR_CYBER_HQ: "Cyber Headquarters"
  STR_CYBER_HQ_UFOPEDIA: "By expanding our knowledge in cybernetics, we created a project to upgrade our Headquarters. By installing cutting-edge (and expensive) toys such as speech synthesis recognizers and personality modules, we increased operational efficiency by 140%. In other words, we can now fit 4 more eggheads here than usual!"

  STR_LAB_T1: "Basic Laboratory"
  STR_LAB_T1_UFOPEDIA: "A small laboratory for 10 scientists. Contains basic equipment for developing simple projects such as materials and components."

  STR_MEDBAY_FACILITY: "Medical Bay Project"

# VEHICLES
  STR_FAGGIO_BIKE_UFOPEDIA: "A single-seat sports bike from the French company «Moteurs Occasionnels»."
  STR_FAGGIO_BIKE: "FAGGIO"

  STR_FUTURECAR1: "BANSHEE"
  STR_FUTURECAR1_UFOPEDIA: "An elegant and reliable form of transport in this grim world. Cheap."

  STR_HOVERVAN_BUY: "Purchase Hover Van"
  STR_HOVERVAN: "HOVER VAN"
  STR_HOVERVAN_UFOPEDIA: "A converted gravity van from the Triline phone company. Despite its low speed, it is quite spacious and inconspicuous to enemy vessels."

  STR_CICADA_CRAFT: "CICADA"
  STR_CICADA_CRAFT_BUY: "Purchase CICADA"
  STR_CICADA_UFOPEDIA: "A small vertical-takeoff assault craft capable of carrying a small squad."

  STR_FUTUREHAMVEE_BUY: "Purchase HAMVEE"
  STR_FUTUREHAMVEE: "HAMVEE"
  STR_FUTUREHAMVEE_UFOPEDIA: "A tough vehicle capable of carrying a small squad. It also features an automatic turret mounted on the roof!"

  STR_DODO_CRAFT_SMALL_BUY: "Purchase HUMMINGBIRD"
  STR_DODO_SMALL_CRAFT: "HUMMINGBIRD"
  STR_DODO_SMALL_CRAFT_UFOPEDIA: "Small transport craft."

  STR_DODO_CRAFT: "DODO"
  STR_DODO_CRAFT_UFOPEDIA: "It's ironic that this junker was named after an extinct bird species, as it uses ancient energy systems for vertical takeoff and landing."

  STR_DODO_BIG_CRAFT: "HAMMERHEAD"
  STR_DODO_BIG_CRAFT_UFOPEDIA: "A modified DODO for transporting larger numbers of operatives."

  STR_GOSHAWK_PURCHES: "Purchase GOSHAWK"
  STR_GOSHAWK: "GOSHAWK"
  STR_GOSHAWK_UFOPEDIA: "An outdated combat aircraft model. Features two pulse engines, a primitive radar system, and weak armor."

# VEHICLE ARMAMENT
  STR_AUTOCANNON_25MM: "25mm Autocannon"
  STR_AUTOCANNON_25MM_UC: "25MM AUTOCANNON"
  STR_AUTOCANNON_25MM_ROUNDS_X50: "25mm Cannon Ammo (x50)"
  STR_AUTOCANNON_25MM_PURCHES: "Purchase 25mm Aircraft Cannon"
  STR_AUTOCANNON_25MM_UC_UFOPEDIA: "A primitive aircraft cannon chambered in 25mm. Not as powerful compared to other weapon systems."

  STR_LASER_MINICANNON_PURCHES: "Purchase Aircraft Mini-Laser"
  STR_LASER_MINICANNON_UC: "MINI-LASER"
  STR_LASER_MINICANNON_UFOPEDIA: "A lightweight laser weapon. It recharges from the base's power systems, so ammunition is practically unlimited."

# UNIT DESCRIPTIONS (UFOPEDIA)

  # Street Gangs - Tiger Claw
  STR_RACE_TIGERCLAW: "Tiger Claw Gang"
  STR_TIGERCALW: "Tiger Claw"
  STR_TIGERCALW_FEMGOON: "Tiger Claw She-Goon"
  STR_TIGERCALW_GOON: "Tiger Claw Gang Member"
  STR_TIGERCALW_WARCHEEF: "Tiger Claw Leader"
  STR_STREETGANG_TG_GOON: "Tiger Claw Goon"
  STR_STREETGANG_TG_GOON_UFOPEDIA: "New recruits of the young street gang Tiger Claw. They take their initiation very seriously. They excel in melee combat but are terrible shots with firearms."

  # MILITARISTS
  STR_WARDOGS_GOON: "Militarist Goon"
  STR_WARDOGS_HANCHMAN: "Militarist Henchman"
