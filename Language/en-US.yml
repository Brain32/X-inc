  STR_BURGLARY_APPREHENSION: "Raid on Residential District"

  STR_SNEEDS_YOUR_FEEDS: "Names and Seeds"
  STR_SNEEDS_YOUR_FEEDS_DESCRIPTION: "Local Wasteland residents in this area are complaining about one idiotic mutant who constantly steals other people's stuff and tries to sell it back to them. Outrageous! The locals are furious at such audacity and ask us to deal with this asshole."
  STR_SNEEDS_YOUR_FEEDS_BRIEFING: "Local Wasteland residents in this area are complaining about one idiotic mutant who constantly steals other people's stuff and tries to sell it back to them. Outrageous! The locals are furious at such audacity and ask us to deal with this asshole.{NEWLINE}To abort the mission, move X-INC operatives to the exit zone and click the 'Leave Battlefield' icon."

  STR_SMUGLER_CLUB_MARK: "Smuggler Club"
  STR_SMUGLER_CLUB: "Smuggler Club"
  STR_SMUGLER_CLUB_BRIEFING: "Megapol informed us about a hideout of local dealers who... don't want to cooperate nicely with law enforcement. We 'accidentally' obtained the coordinates of their nightclub where they stash all their goods. Why not pay them a visit?{NEWLINE}WARNING! — Only civilian armor and melee weapons are allowed on this mission."
  STR_SMUGLER_CLUB_ALERT_DESCRIPTION: "Megapol informed us about a hideout of local dealers who... don't want to cooperate nicely with law enforcement. We 'accidentally' obtained the coordinates of their nightclub where they stash all their goods. Why not pay them a visit?{NEWLINE}WARNING! — Only civilian armor and melee weapons are allowed on this mission."

  STR_GANG_BURGLARY: "Raid on Residential District"
  STR_GANG_BURGLARY_DESCRIPTION: "A raid on a residential district in this megacity sector was recently carried out. We managed to track the attackers in this area. If we can intercept them, we can apprehend them!"
  STR_GANG_BURGLARY_BRIEFING: "A raid on a residential district in this megacity sector was recently carried out. We managed to track the attackers in this area. If we can intercept them, we can apprehend them!"

  STR_GANG_BURGLARY_T2: "Raid on Residential District"
  STR_GANG_BURGLARY_T2_DESCRIPTION: "A raid on a residential district in this megacity sector was recently carried out. We managed to track the attackers in this area. If we can intercept them, we can apprehend them!{NEWLINE}{NEWLINE}Be careful — witnesses report the attackers were armed with firearms."
  STR_GANG_BURGLARY_T2_BRIEFING: "A raid on a residential district in this megacity sector was recently carried out. We managed to track the attackers in this area. If we can intercept them, we can apprehend them!{NEWLINE}{NEWLINE}Be careful — witnesses report the attackers were armed with firearms.{NEWLINE}To abort the mission, move X-INC operatives to the exit zone and click the 'Leave Battlefield' icon."

  STR_GANG_BURGLARY_T3: "Raid on Residential District"
  STR_GANG_BURGLARY_T3_DESCRIPTION: "A raid on a residential district in this megacity sector was recently carried out. We managed to track the attackers in this area. If we can intercept them, we can apprehend them!{NEWLINE}{NEWLINE}Be careful — witnesses report extremely erratic behavior and excessive aggression from the attackers."
  STR_GANG_BURGLARY_T3_BRIEFING: "A raid on a residential district in this megacity sector was recently carried out. We managed to track the attackers in this area. If we can intercept them, we can apprehend them!{NEWLINE}{NEWLINE}Be careful — witnesses report extremely erratic behavior and excessive aggression from the attackers.{NEWLINE}To abort the mission, move X-INC operatives to the exit zone and click the 'Leave Battlefield' icon."

  STR_POLICE_PD_ASSAULT: "Assault on Police Station"
  STR_POLICE_PD_ASSAULT_DESCRIPTION: "A Megapol representative urgently contacted us with an important request. Just five hours ago, a full-scale takeover of a megacity police station was carried out by some fanatics. They ask us to help local authorities clear out and eliminate the occupiers."
  STR_POLICE_PD_ASSAULT_BRIEFING: "A Megapol representative urgently contacted us with an important request. Just five hours ago, a full-scale takeover of a megacity police station was carried out by some fanatics. They ask us to help local authorities clear out and eliminate the occupiers.{NEWLINE}To abort the mission, move X-INC operatives to the exit zone and click the 'Leave Battlefield' icon."

  STR_HOOD_APPREHENSION: "Gangster District"

  STR_MUTANT_HUNT_SMALL: "Mutant Hunt"
  STR_MUTANT_HUNT_SMALL_DESCRIPTION: "Local Wasteland residents report a small mutant nest in this area. They asked us to get rid of this filth."
  STR_MUTANT_HUNT_SMALL_BRIEFING: "Local Wasteland residents report a small mutant nest in this area. They asked us to get rid of this filth.{NEWLINE}To abort the mission, move X-INC operatives to the exit zone and click the 'Leave Battlefield' icon."

  STR_WASTELAND_GANG: "Raider Outpost"
  STR_WASTELAND_GANG_BRIEFING: "Local Wasteland residents are complaining about frequent raider attacks in this area. Obviously local governments can't be bothered to waste resources on some small-time bandits in the middle of nowhere. Raiding this place will not only bring us some fame, but we can also seize some guns and equipment as... evidence. If you know what I mean.{NEWLINE}To abort the mission, move X-INC operatives to the exit zone and click the 'Leave Battlefield' icon."

  STR_WASTELAND_FACTORY_RAID: "Raider Weapons Factory"
  STR_WASTELAND_FACTORY_DESCRIPTION: "Our contacts in the Wastes asked around and found a small bandit factory somewhere in this part of the desert. It looks like a weapons workshop where local bandits make guns! We could pay them a visit and take their weapons and equipment. But be careful — the local bandits are well armed."
  STR_WASTELAND_FACTORY_RAID_BRIEFING: "Our contacts in the Wastes asked around and found a small bandit factory somewhere in this part of the desert. It looks like a weapons workshop where local bandits make guns! We could pay them a visit and take their weapons and equipment. But be careful — the local bandits are well armed.{NEWLINE}To abort the mission, move X-INC operatives to the exit zone and click the 'Leave Battlefield' icon."

  STR_WASTELAND_BIG_FACTORY_RAID: "Large Raider Weapons Factory"
  STR_WASTELAND_BIG_FACTORY_RAID_DESCRIPTION: "After interrogating a machinist, we located one of the large weapons manufacturing plants."
  STR_WASTELAND_BIG_FACTORY_RAID_BRIEFING: "After interrogating a machinist, we located one of the large weapons manufacturing plants.{NEWLINE}To abort the mission, move X-INC operatives to the exit zone and click the 'Leave Battlefield' icon."

  STR_SCAVENGERS_OLD_MILBASE_MISSION_RES: "!Raid on Old Military Base!"
  STR_SCAVANGER_HUNT_OLD_BASE: "Scavengers: Old Base"
  STR_SCAVANGER_HUNT_OLD_BASE_ALERT: "Scavenging in Old Base"
  STR_SCAVANGER_HUNT_OLD_BASE_DESCRIPTION: "The Junkers contacted us and reported the location of an old base built during the Great Invasion. They are asking for our help because the base is crawling with security robots and mutants.{NEWLINE}Our employers won't be happy that we're poking around old government bases (-250 Reputation). However, the equipment and technology hidden deep in this bunker might be worth it."
  STR_SCAVANGER_HUNT_OLD_BASE_BRIEFING: "The Junkers contacted us and reported the location of an old base built during the Great Invasion. They are asking for our help because the base is crawling with security robots and mutants.{NEWLINE}Our employers won't be happy that we're poking around old government bases (-250 Reputation). However, the equipment and technology hidden deep in this bunker might be worth it."

  STR_GANG_HI_RISE_HOUSE_TAKEOVER: "Clearing Out a Den"
  STR_GANG_HR_TAKEOVER_ALERT: "Clearing Out a Den"
  STR_GANG_HI_RISE_HOUSE_TAKEOVER_BRIEFING: "Megapol contacted us with a job offer. In this megacity sector, a bunch of drugged-up street thugs have taken over a building and refuse to leave peacefully. Why not teach these bastards a lesson and carry them out feet first? Plus, it'll be great PR for our agency!"
  STR_GANG_HR_TAKEOVER_DESCRIPTION: "Megapol contacted us with a job offer. In this megacity sector, a bunch of drugged-up street thugs have taken over a building and refuse to leave peacefully. Why not teach these bastards a lesson and carry them out feet first? Plus, it'll be great PR for our agency!"

  STR_WASTELAND_FARM_RAID: "Farm Raid"
  STR_WASTELAND_FARM_RAID_ALERT: "Raider Attack on Farm"
  STR_WASTELAND_FARM_RAID_DESCRIPTION: "One of our clients contacted us asking for help. His small farm is frequently attacked by various thugs from the Wastes. It's gotten to the point where they're shooting directly at the farm workers! Time to teach these fuckers a lesson and earn our pay. We will be accompanied by several armed farmers — try to keep them alive if possible."
  STR_WASTELAND_FARM_RAID_BRIEFING: "One of our clients contacted us asking for help. His small private farm is frequently attacked by various thugs from the Wastes. It's gotten to the point where they're shooting directly at the farm workers! Time to teach these fuckers a lesson and earn our pay. We will be accompanied by several armed farmers — try to keep them alive if possible.{NEWLINE}To abort the mission, move X-INC agents to the exit zone and click the 'Leave Battlefield' icon."

  STR_SIN_CRAFT_SHOOTDOWN: "Unplanned Landing"
  STR_SIN_CRAFT_SHOOTDOWN_DESCRIPTION: "“Alert! Alert! Anyone who can hear us! Our craft was shot down by rebels and we need help! Get our guys out of here and our corporation will reward you generously. But be careful — these bastards are well armed, and the engine of this junker could explode at any moment.”"
  STR_SIN_CRAFT_SHOOTDOWN_BRIEFING: "“Alert! Alert! Anyone who can hear us! Our craft was shot down by rebels and we need help! Get our guys out of here and our corporation will reward you generously. But be careful — these bastards are well armed, and the engine of this junker could explode at any moment.”{NEWLINE}To abort the mission, move X-INC operatives to the exit zone and click the 'Leave Battlefield' icon."

  STR_BANDIT_BUNKER_RAID: "Raider Military Bunker"
  STR_BANDIT_BUNKER_RAID_ALERT: "Military Bunker"
  STR_BANDIT_BUNKER_RAID_DESCRIPTION: "A local Wasteland ranger leader gave us the coordinates of this pre-war bunker occupied by a local raider gang. The place is well fortified, and according to former slaves, it has a working security system with turrets. So be extremely careful, and bring a couple of EMP grenades if possible."
  STR_BANDIT_BUNKER_RAID_RIEFING: "A local Wasteland ranger leader gave us the coordinates of this pre-war bunker occupied by a local raider gang. The place is well fortified, and according to former slaves, it has a working security system with turrets. So be extremely careful, and bring a couple of EMP grenades if possible.{NEWLINE}To abort the mission, move X-INC operatives to the exit zone and click the 'Leave Battlefield' icon."

  STR_SIN_OUTPOST: "Terrorist Outpost"
  STR_ALERT_SIN_OUTPOST: "Terrorist Outpost"
  STR_SIN_OUTPOST_DESCRIPTION: "Locals say a terrorist cell recently set up here. We should deal with them!"
  STR_SIN_OUTPOST_BRIEFING: "Locals say a terrorist cell recently set up here. We should deal with them!{NEWLINE}To abort the mission, move X-INC operatives to the exit zone and click the 'Leave Battlefield' icon."

  STR_BUTCHERY_RAID: "Butcher Shop of Horrors"
  STR_BUTCHERY_RAID_ALERT: "Butcher Shop of Horrors"
  STR_BUTCHERY_RAID_APPREHENSION: "Butcher Shop of Horrors"
  STR_BUTCHERY_RAID_DESCRIPTION: "We received a job from Megapol. After a failed raid on one street gang, several Megapol officers were taken alive and are being held in an old dog food production facility. Of course none of those lazy bastards in Megapol will risk their own asses, so they want to send those they don't mind losing to the meat grinder — us. Be careful, the thugs are well armed and prepared."
  STR_BUTCHERY_RAID_BRIEFING: "We received a job from Megapol. After a failed raid on one street gang, several Megapol officers were taken alive and are being held in an old dog food production facility. Of course none of those lazy bastards in Megapol will risk their own asses, so they want to send those they don't mind losing to the meat grinder — us. Be careful, the thugs are well armed and prepared.{NEWLINE}To abort the mission, move X-COM agents to the exit zone and click the 'Leave Battlefield' icon."

  STR_SIN_TERROR: "Act of Terror"
  STR_MARKER_SIN_TERROR_MISSION: "Terrorist Attack"
  STR_SIN_TERROR_MISSION_DESC: "Local authorities are asking for help! The SiN terrorist group has attacked a residential district in the megacity. Local special services are busy suppressing terror in other parts of the city. But if we storm in and wipe out all the bastards killing civilians, it will be excellent PR for us!"
  STR_SIN_TERROR_MISSION_BRIEFING: "Local authorities are asking for help! The SiN terrorist group has attacked a residential district in the megacity. Local special services are busy suppressing terror in other parts of the city. But if we storm in and wipe out all the bastards killing civilians, it will be excellent PR for us!{NEWLINE}To abort the mission, move X-COM agents to the exit zone and click the 'Leave Battlefield' icon."

