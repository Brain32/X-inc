  STR_TRAFFIC_TICKET_DESCRIPTION: "After one of our missions we received a fine for illegal parking. Such minor offenses still damage your reputation.{NEWLINE}[-25 Reputation]{NEWLINE}[-1,000 Credits]"

# STARTING EVENTS
  STR_START_LOCATION_EVENT_RUSSIA: "Starting Country: Russian Federation"
  STR_START_LOCATION_EVENT_RUSSIA_DESCRIPTION: ">One of the largest countries in the world with vast lands and rich history. Our patrons managed to convince the military to assign us a couple of experienced soldiers.{NEWLINE}>Local governments reluctantly allowed us to operate in their country... for a small compensation.{NEWLINE}[-350,000 Credits]{NEWLINE}Political Pressure: Moderate [-50 Starting Reputation]"

  STR_START_LOCATION_EVENT_UK: "Starting Country: United Kingdom"
  STR_START_LOCATION_EVENT_UK_DESCRIPTION: ">The United Kingdom is a union of two old nations. This state is known for its harshness toward civilians. Therefore, local authorities issued us elite special forces protective gear.{NEWLINE}Political Pressure: Moderate [-50 Starting Reputation]"

# RESEARCH / TECH TREE
  STR_OURORIGINS: "Our Origins"
  STR_OURORIGINS_UFOPEDIA: "More than 200 years have passed since the Earth Defense Fleet X-Com destroyed the last alien strongholds in our Solar System. Much has changed since then and humanity has mastered deep space, beginning to colonize nearby corners of the galaxy.{NEWLINE}Who are we? A bunch of enterprising mercenaries who seized a small military base on Earth. Our board of directors chose you — a cryo-prisoner from 2068 — to lead our mercenary army! You do have experience commanding such organizations, right?"

  STR_INTEL_OFFICER_1: "Briefing"
  INTEL_OFFICER_INTRODUCTION_UFOPEDIA: "Greetings, Chief! I hope the recovery from cryo-sleep went smoothly. Since you spent almost 150 years in the freezer, allow me to bring you up to speed. Our organization is a private police force that specializes in catching all kinds of scum around megacities. We also cooperate with Megapol and other Earth security structures. But after several years of decline, the board of directors decided to appoint a new commander — you!{NEWLINE}I really hope you can handle this difficult task, Chief."

  STR_MEDICAL_BRANCH: "Medicine"
  STR_MEDICAL_BRANCH_UFOPEDIA: "We can now develop our own projects for various medications and augmentations."

  STR_PERSONNEL_REFORM: "Personnel Reform"
  STR_PERSONEL_REFORM_UFOPEDIA: "To effectively manage your new company, you decided to review its history. It turned out that X-INC was essentially a shell company for guarding private enterprises and government facilities. Its former leader and founders were influential people. So why bother creating such a small subsidiary? Who knows. Your task is to turn this dumpster fire into something worthwhile, so you started working with the resources you have. Time to expand."

  STR_WEAPON_SHOPPING: "Weapon Shopping"
  STR_WEAPON_SHOPPING_UFOPEDIA: "We scoured city shops looking for more suitable equipment for our organization. As expected, we found nothing interesting — just useless junk. However, these searches gave us the idea to dive into the Black Market. Of course, we won't immediately get top-tier military gear, and it will take time to build connections, but it's worth trying.{NEWLINE}{NEWLINE}{ALT}You can check out the new weapons in the Cyberpedia.{ALT}"

  STR_GUNSHOP_ACCESS: "Gun Shop Access"
  STR_GUNSHOP_ACCESS_UFOPEDIA: "We can now buy NORMAL weapons. The quality isn't great, but at least we can arm ourselves with what street thugs buy under the counter in shady shops."

  STR_WASTELAND_MISSIONS: "Wasteland Operations"
  STR_WASTELAND_MISSIONS_UFOPEDIA: "The Wastes are a place of opportunity, even if it's a stinking hole populated by mutants, bandits, and other societal rejects. Locals will be very interested in cooperating with people from the megacities, like us. After all, having friends and allies never hurts, right?{NEWLINE}{NEWLINE}If our informants dig up anything, we'll let you know, Chief."

  STR_WASTELAND_WEAPON_FACTORY_PED: "Makeshift Weapons Factories"
  STR_WASTELAND_WEAPON_FACTORY_UFOPEDIA: "Finding a gun in the Wastes is not easy. Finding a good gun is even harder. After questioning raiders and bandits, we learned that some groups have small but functional makeshift factories producing homemade firearms! If our informants can locate such sites, we could get our hands on this kind of weaponry."

  STR_WEAPON_FACIL_RES: "!Raider Weapons Factory!"
  STR_WASTELAND_LORE_1_PED: "The Wastes"
  STR_WASTELAND_LORE_1_UFOPEDIA: "After World War III, 84% of Earth's surface was scorched by nuclear fire. These territories are simply called the Wastes by the people. City dwellers rarely venture here because of the numerous bandits and mutants, and the Earth government and Megapol don't like wasting precious time and resources on petty squabbles among the inhabitants. This place is perfect for criminal elements. That's why there's plenty of work for us!"

  STR_BLACK_MARKET_ACCES: "Black Market"
  STR_BLACK_MARKET_UFOPEDIA: "Navigating through layers of conspiracy and secrecy to find useful contacts wasn't easy, but we succeeded! After meeting the right people and waving some cash in front of their noses, an entire world of illegal implants, armor, and weapons opened up to us."

  STR_MILITARY_SUPLIES: "Military Supplies Access"
  STR_MILITARY_SUPPLIES: "Military Supplies"
  STR_MILITARY_SUPPLIES_UFOPEDIA: "Now that we have strong connections with the military, we no longer have to worry about shortages of proper weapons and armor! We can now purchase standard military-grade equipment for our needs."

  STR_RIMWORLD_SUPPLIES_ACCES: "Colonial Supplies Access"
  STR_RIMWORLD_SUPPLIES_UFOPEDIA: "We can now order equipment from colonial infantry suppliers."

  STR_ELECTRONICS_UFOPED: "Electronics Supplies"
  STR_ELECTRONICS: "Electronics Supplies"
  STR_ELECTRONICS_UFOPEDIA: "Modern 24th-century electronics aren't particularly complicated to understand or study in detail. Most information is already publicly available, except for patented and highly complex power schemes. All we needed was to find reliable suppliers. Now that it's done, we can order specific types of electronics and equipment for our needs."

  STR_BASIC_ARMOUR_DESIGN: "Basic Armor Design"
  STR_BASIC_ARMOUR_DESIGN_UFOPEDIA: "After studying the combat armor available on the market, we noticed that they mostly use light but durable materials such as polymers and plastisteel. They are usually good at dispersing kinetic energy. By studying the processing of such complex materials, we can now develop our own armor suits instead of depending on those damn greedy second-hand speculators."

  STR_MINIGUN_LICENSE_PED: "Minigun License Acquisition"
  STR_MINIGUN_LICENSE_UFOPEDIA: "After a long struggle with bureaucracy, we can finally purchase machine guns and even military-grade miniguns. Of course we still need to find and study their manufacturers, but at least buying them will be easier now."
  STR_MINIGUN_LICENSE: "License: Machine Guns"

  STR_EXPLOSIVES_LICENSE_PED: "Explosives License Acquisition"
  STR_EXPLOSIVES_LICENSE_UFOPEDIA: "We can now purchase rocket launchers and grenades from verified suppliers."
  STR_EXPLOSIVES_LICENSE: "License: Explosives"

  STR_BASE_EXPANSION_PROJECT: "Base Expansion Project"
  STR_BASE_EXPANSION_PROJECT_UFOPEDIA: "We can now build base modules!"

  STR_ALIEN_ALLOYS_MATRIX: "Plastisteel Matrix"
  STR_ALIEN_ALLOYS_MATRIX_UFOPEDIA: "After finding the necessary blueprints on the black market, we can now produce plastisteel and all related components ourselves."

  OLD_MILBASE_MISSION_PED: "!Raids on Old Military Bases!"
  STR_OLD_MILBASE_MISSION_READY_UFOPEDIA: "We spoke with several Wasteland ranger leaders, and they agreed to let us access old military bases. They warn that the bases may contain mutants and old security robots that will tear apart anyone who dares enter. They advise us to be prepared for such expeditions and will notify us immediately if an opportunity arises. However, some of our 'shareholders' will not be pleased with this kind of... liberty."

# TRANSFORMATIONS & AUGMENTATIONS
  # TRAINING
  STR_TRANSFORMATIONS_AND_AUGS_UC: "TRANSFORMATIONS & AUGMENTATIONS"
  STR_BASIC_FIREARMS_TRAINING: "Basic Firearms Training"
  STR_TRNS_BASICSHOOTING_PED: "Basic Firearms Training"
  STR_BASICSHOOTING_UFOPEDIA: "After a short talk with HR, you were horrified to learn that none of the recruits had received basic firearms training! You had to spend some resources to organize proper instruction.{NEWLINE}{NEWLINE}Our operatives can now take shooting courses that increase their {ALT}Firing Accuracy{ALT} by 12 and {ALT}Reactions{ALT} by 4. Training lasts 6 days and costs 7,000 credits. Requires a Gym."

  # AUGMENTATIONS
  STR_AUGMENTATION_BASICS: "Agent Augmentations"
  STR_AUGMENTATION_BASICS_UFOPEDIA: "We live in an age where human cyberization is no longer rare or prohibitively expensive. All we need is the equipment, a specialist to install it, and the hardware itself. However, installing implants from other manufacturers is quite risky. So we came up with a simple but brilliant solution — reinstall the OS on existing implants and just upgrade the hardware. Therefore, implants should be installed on our operatives one at a time."

  STR_AUG_MIL_NEIROIMPLANT: "Military Neuroimplant"
  STR_AUG_MIL_NEIROIMPLANT_UFOPEDIA: "A very expensive piece of hardware. Usually installed on members of elite units or bodyguards of corporate CEOs. The interface is so good it doesn't even affect the operative's concentration.{NEWLINE}{NEWLINE}+8 Accuracy;{NEWLINE}+8 Reactions;{NEWLINE}+6 Melee;{NEWLINE}+8 Throwing Accuracy;{NEWLINE}+1 Concentration;{NEWLINE}+3 Morale (per turn)."

  STR_AUG_SPAMTON_GLASSES: "BROKEN GLASSES"
  STR_AUG_SPAMTON_GLASSES_UFOPEDIA: "THESE [[Magnificent]] AND [[Mind-Blowing]] [Trade Name] WILL TURN YOU INTO A TRUE [[Link Blocked]]. ALL YOU NEED IS [Account Details] AND [[Numbers On The Back]]. SIDE EFFECTS INCLUDE [[Stomach Discomfort And Pain?]].{NEWLINE}+65,535 TU.{NEWLINE}+65,535 Energy.{NEWLINE}+65,535 Health.{NEWLINE}+65,535 [[Guts]].{NEWLINE}+65,535 Reactions.{NEWLINE}+65,535 Firing Accuracy.{NEWLINE}+65,535 Throwing Accuracy.{NEWLINE}+65,535 Strength.{NEWLINE}+65,535 Psi Strength.{NEWLINE}+65,535 Psi Skill."

  # EYE AUGMENTATIONS
  STR_AUG_EYE_MK1: "Eye Implant Mk1"
  STR_AUG_EYE_MK1_UFOPEDIA: "Corporate 'Scanner' ocular. Magnified vision, built-in sign translator and micro-expression loyalty analyzer. Advertising disabled for an extra fee.{NEWLINE}{NEWLINE}+12 Accuracy;{NEWLINE}-1 Concentration."

  STR_AUG_EYE_MK2: "Eye Implant Mk2"
  STR_AUG_EYE_MK2_UFOPEDIA: "Military-grade eye implant optimized for combat. The new interface will slightly mess with the user's head.{NEWLINE}{NEWLINE}+8 Accuracy;{NEWLINE}+2 Night Vision."

  STR_AUG_EYE_MK3: "Eye Implant Mk3"
  STR_AUG_EYE_MK3_UFOPEDIA: "Tactical 'Falcon' visor. Night vision, thermal imaging, rangefinder and ballistic computer. Designed for private military company snipers.{NEWLINE}{NEWLINE}+6 Accuracy;{NEWLINE}+6 Reactions;{NEWLINE}+4 Night Vision."

  # ARM AUGMENTATIONS
  STR_AUG_ARM_MK1: "Arm Implant Mk1"
  STR_AUG_ARM_MK1_UFOPEDIA: "Budget exomuscle enhancers. Flimsy, often squeaky, but let you tighten nuts without a wrench and open pickle jars with one hand. Popular with loaders and plumbers.{NEWLINE}{NEWLINE}+10 Strength;{NEWLINE}-1 Concentration."

  STR_AUG_ARM_MK2: "Arm Implant Mk2"
  STR_AUG_ARM_MK2_UFOPEDIA: "Sturdy stabilized frame. Provides an iron grip, improves accuracy with heavy weapons, and lets you bend a steel beam in a fight. Standard issue for corporate security.{NEWLINE}{NEWLINE}+6 Strength;{NEWLINE}+2 Accuracy."

  STR_AUG_ARM_MK3: "Arm Implant Mk3"
  STR_AUG_ARM_MK3_UFOPEDIA: "Hydraulic monster with carbon-fiber coating. Full forearm replacement with integrated light weapon mount and a laser sight built into the palm!{NEWLINE}{NEWLINE}+8 Strength;{NEWLINE}+5 Accuracy."

  # LEG AUGMENTATIONS
  STR_AUG_LEG_MK1: "Leg Implant Mk1"
  STR_AUG_LEG_MK1_UFOPEDIA: "Consumer 'Courier' model. Light shock absorption for delivery people and those who are always late. Cushions jumps from the 2nd floor and saves 15% energy while running. Tends to squeak in rainy weather. The ad promised 'kangaroo-like jumps', but didn't specify which kangaroo.{NEWLINE}{NEWLINE}+12 TU;{NEWLINE}+8 Stamina;{NEWLINE}-2 Morale (per turn)."

  STR_AUG_LEG_MK2: "Leg Implant Mk2"
  STR_AUG_LEG_MK2_UFOPEDIA: "Tactical 'Runner' frame. Increases movement speed and jump height, stabilizes stance. Adaptive shock absorption. Popular with neo-city parkour runners and installers.{NEWLINE}{NEWLINE}+8 TU;{NEWLINE}+6 Stamina."

  STR_AUG_LEG_MK3: "Leg Implant Mk3"
  STR_AUG_LEG_MK3_UFOPEDIA: "Tactical sprint complex 'Griffon'. Allows sprinting up to 55 km/h over short distances. Does not strain leg and torso muscles.{NEWLINE}{NEWLINE}+6 TU;{NEWLINE}+10 Stamina."

  # BRAIN AUGMENTATIONS
  STR_AUG_BRAIN_MK1: "Brain Implant Mk1"
  STR_AUG_BRAIN_MK1_UFOPEDIA: "Basic neuroimplant for office plankton. Lets you keep three work chats, two calendars, and a reminder to buy milk in your head. Side effects include mild tinnitus (-1 Concentration per turn) and intrusive ads while sleeping.{NEWLINE}{NEWLINE}+12 Reactions;{NEWLINE}+8 Melee;{NEWLINE}+10 Psi Skill;{NEWLINE}+10 Psi Strength;{NEWLINE}-1 Concentration."

  STR_AUG_BRAIN_MK2: "Brain Implant Mk2"
  STR_AUG_BRAIN_MK2_UFOPEDIA: "Favorite model of mid-level hackers and corporate sharks. Speeds up reaction, improves threat and target recognition, stimulates key brain areas, and lets you slow down subjective time for 5 minutes a day.{NEWLINE}{NEWLINE}+10 Reactions;{NEWLINE}+6 Melee;{NEWLINE}+8 Psi Skill;{NEWLINE}+8 Psi Strength."

  STR_AUG_BRAIN_MK3: "Brain Implant Mk3"
  STR_AUG_BRAIN_MK3_UFOPEDIA: "Tactical AI 'Oracle'. Custom product for special forces and corporate bodyguards. Improved threat analyzer software, slowed time perception, and direct neural interface. May cause sociopathic tendencies and loss of empathy.{NEWLINE}{NEWLINE}+8 Reactions;{NEWLINE}+6 Melee;{NEWLINE}+6 Psi Skill;{NEWLINE}+6 Psi Strength."

  # LUNG AUGMENTATIONS
  STR_AUG_LUNG_MK1: "Lung Implant Mk1"
  STR_AUG_LUNG_MK1_UFOPEDIA: "Cheap lung implant.{NEWLINE}{NEWLINE}+12 Stamina;{NEWLINE}+4 Stamina per turn;{NEWLINE}+2 TU per turn;{NEWLINE}-1 Concentration per turn."

  STR_AUG_LUNG_MK2: "Lung Implant Mk2"
  STR_AUG_LUNG_MK2_UFOPEDIA: "Standard lung implant.{NEWLINE}{NEWLINE}+8 Stamina;{NEWLINE}+2 Stamina per turn;{NEWLINE}+1 TU per turn;{NEWLINE}-1 Concentration per turn."

  STR_AUG_LUNG_MK3: "Lung Implant Mk3"
  STR_AUG_LUNG_MK3_UFOPEDIA: "Expensive lung implant. Banned by the 2132 Hague Convention.{NEWLINE}{NEWLINE}+6 Stamina;{NEWLINE}+5 Health;{NEWLINE}+3 Stamina per turn;{NEWLINE}+2 TU per turn;{NEWLINE}+4 Stun Recovery per turn."

  # HEART AUGMENTATIONS
  STR_AUG_HEART_MK1: "Heart Implant Mk1"
  STR_AUG_HEART_MK1_UFOPEDIA: "Cheap heart implant.{NEWLINE}{NEWLINE}+6 Stamina;{NEWLINE}+12 Health;{NEWLINE}+2 Energy Regeneration per turn;{NEWLINE}-1 Concentration per turn."

  STR_AUG_HEART_MK2: "Heart Implant Mk2"
  STR_AUG_HEART_MK2_UFOPEDIA: "Standard heart implant.{NEWLINE}{NEWLINE}+4 Stamina;{NEWLINE}+10 Health;{NEWLINE}+2 Energy Regeneration per turn."

  STR_AUG_HEART_MK3: "Heart Implant Mk3"
  STR_AUG_HEART_MK3_UFOPEDIA: "Expensive heart implant.{NEWLINE}{NEWLINE}+8 Health;{NEWLINE}+1 Health Regeneration per turn;{NEWLINE}+2 Energy Regeneration per turn."

  # SKIN / CHEST AUGMENTATIONS
  STR_AUG_CHEST_MK1: "Skin Implant Mk1"
  STR_AUG_CHEST_MK1_UFOPEDIA: "Cheap subdermal armor. Usually installed by office plankton who can't handle their job stress.{NEWLINE}{NEWLINE}+6 Front Armor;{NEWLINE}+6 Side Armor;{NEWLINE}-3 Morale per turn."

  STR_AUG_CHEST_MK2: "Skin Implant Mk2"
  STR_AUG_CHEST_MK2_UFOPEDIA: "Standard subdermal armor.{NEWLINE}{NEWLINE}+4 Front Armor;{NEWLINE}+4 Side Armor;{NEWLINE}-6 TU."

  STR_AUG_CHEST_MK3: "Skin Implant Mk3"
  STR_AUG_CHEST_MK3_UFOPEDIA: "Expensive subdermal armor.{NEWLINE}{NEWLINE}+6 Front Armor;{NEWLINE}+6 Side Armor;{NEWLINE}-4 TU."

# REWARDS & ACHIEVEMENTS
  STR_MELEE_PSYCHO_NAME: "Melee Psycho"
  STR_MELEE_PSYCHO_UFOPEDIA: "You REALLY enjoy causing pain to other people. Deliver justice using unconventional melee weapons such as bats, axes, knives or brass knuckles.{NEWLINE}{NEWLINE}Even levels grant +2 Stamina.{NEWLINE}Odd levels grant +1 TU.{NEWLINE}Level 5 gives +1 Stamina regeneration per turn.{NEWLINE}Level 10 grants +10 Bravery."

  STR_MEDAL_MELEE_PSYCHO_NAME: "Medal - Psycho"
  STR_MEDAL_MELEE_PSYCHO_UFOPEDIA: "You REALLY enjoy causing pain to other people. Deliver justice using unconventional melee weapons such as bats, axes, special knives or brass knuckles."

  STR_OLD_WOLRD_ENJOYER_NAME: "Old World Enjoyer"
  STR_OLD_WOLRD_ENJOYER_UFOPEDIA: "Who needs all these fancy new guns when a good old .45 Colt is just as good? Besides, using this weapon gives you a strange feeling of nostalgia you never actually had... Use pre-war weapons to uphold Law and Order on Earth.{NEWLINE}{NEWLINE}Grants +1 Accuracy and Reactions alternately.{NEWLINE}At level V increases Concentration by 5.{NEWLINE}At level X grants +1 Stamina regeneration per turn and +10 Bravery."

#Cities
