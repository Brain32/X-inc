  STR_WARDOGS_HEAVY: "Militarist Machine Gunner"
  STR_WARDOGS_VETERAN: "Militarist Veteran"

  # WASTELAND RAIDERS
  STR_RACE_WASTELAND_RAIDERS: "Wasteland Raiders"

  STR_RAIDER_BOSS_UFOPEDIA: "Clad in scrap-metal armor, these guys are the toughest and most vicious bastards in their gangs."
  STR_RAIDER_BOSS: "Raider Boss"
  STR_WASTELAND_BOSS_INV: "Raider Boss: Analysis"

  STR_RAIDER_GOON_UFOPEDIA: "Hardened by the brutal life of the Wastes, these guys are at the very bottom of the raider hierarchy."
  STR_RAIDER_GOON: "Raider Goon"
  STR_WASTELAND_GOON_INV: "Raider Goon: Analysis"

  STR_RAIDER_SCOUT: "Raider Scout"
  STR_RAIDER_SCOUT_UFOPEDIA: "Extremely agile and nimble girls. Their night-vision visors allow them to navigate perfectly in the dark."
  STR_WASTELAND_SCOUT_INV: "Raider Scout: Analysis"

  # SMUGGLERS
  STR_SMUGGLER_GOON: "Smuggler Goon"
  STR_SMUGGLER_GOON_UFOPEDIA: "They make their living transporting expensive goods for all sorts of losers, corporate fat cats, and even colonial representatives. These are low-ranking smugglers, but don't underestimate them — they know their business and shoot decently with old weapons. Their outdated millennium-old outfits offer no tactical advantage other than emphasizing their flamboyance."

  STR_SMUGGLER_TOMMY: "Smuggler Enforcer"
  STR_SMUGGLER_TOMMY_UFOPEDIA: "Low-ranking members who show zeal and diligence can rise to become enforcers. They are the toughest and meanest bastards in their crews. Proficient with almost any weapon, excellent negotiators, and can deliver a punch that will spin your head several times. By the way, what's with their outfits? Do they think they're at a stripper party with beer?"

  STR_SMUGGLER_LANCE_INV: "Smuggler Adventurer: Analysis"
  STR_SMUGGLER_LANCE: "Smuggler Adventurer"
  STR_SMUGGLER_LANCE_UFOPEDIA: "Entrepreneurs. These guys have bigger egos than any corporate shark."

  STR_SMUGGLER_DIAZ: "Smuggler Fixer"
  STR_SMUGGLER_DIAZ_UFOPEDIA: "Dealers and fixers — influential smugglers who control the supply and sale of a wide range of goods to various factions. They handle firearms well and wear solid ballistic vests."

  # MEGAPOL
  STR_AUTOCOP_UPED: "Autocop"
  STR_AUTOCOP_UFOPEDIA: "Serve and protect until death — that is their motto. These walking metal wardrobes were once the best Megapol officers. After... unfortunate on-the-job accidents, it was decided to cybernetize what remained of them so their skills wouldn't go to waste. Such cases are relatively rare because cyberization projects are expensive. Their armor is essentially an automated power suit that protects excellently against bullets and buckshot. However, the excessive electronics and servos make them almost useless against electricity and EMP."

  STR_COP1_UPED: "Military Policeman"
  STR_COP1_UFOPEDIA: "Low-ranking Megapol representatives. These poorly educated people were mostly recruited through quotas with the promise of being able to beat other citizens with impunity."

  # GUNRUNNERS
  STR_GUNRUNNER_WORKER: "Gunrunner Worker"
  STR_GUNRUNNER_WORKER_UFOPEDIA: "The brute force of the gunrunners. These guys aren't the brightest, but they are very diligent with machines and metal. Various Wasteland gangs hire them to help produce decent weapons — unlike the junk you find in ruins. Their job is to monitor the production line so some idiot doesn't press the wrong button."
  STR_GUNRUNNERS_WORKER_INV: "Gunrunner Worker: Analysis"

  STR_GUNRUNNER_MASTER: "Gunrunner Machinist"
  STR_GUNRUNNER_MASTER_UFOPEDIA: "Master machinists who are fanatically devoted to their craft. They usually run larger factories and personally oversee the supply of raw materials for weapon and ammo production."
  STR_GUNRUNNER_MASTER_INV: "Gunrunner Machinist: Analysis"

  # OLD ROBOTS
  STR_OLD_TURRET_MINIGUN_ARMOR: "Old Sentry Turret: Analysis"
  STR_OLD_TURRET_MINIGUN: "Old Sentry Turret"
  STR_OLD_TURRET_MINIGUN_UFOPEDIA: "An old, rust-eaten stationary automatic turret. It's a miracle this junk can still stuff enemies with lead — and with such enthusiasm! The electronic systems are still in good condition, so beware of return fire. Equipped with a fast caseless 14mm machine gun that can mow down your operatives like grass."

  STR_OLD_LIGHT_DRONE_ARMOR: "Rusty Maintenance Drone: Analysis"
  STR_OLD_LIGHT_DRONE: "Rusty Maintenance Drone"
  STR_OLD_LIGHT_DRONE_UFOPEDIA: "An old model of maintenance drone. Before the war these tin cans were used to repair equipment and service bunkers. A powerful laser cannon is mounted on the robot's head, capable of piercing almost any decent armor. Although the internal systems and armor look decrepit, the drone has good reaction speed and fairly decent protection."

  STR_OLD_SEC_ROBOT: "Old Security Robot"
  STR_OLD_SEC_ROBOT_ARMOR: "Old Security Robot: Analysis"
  STR_OLD_SEC_ROBOT_UFOPEDIA: "This droid was once the pride of the bunker."

  # SYNDICATE
  STR_SYNDICATE_SOLDIER_ARMOR: "Syndicate Soldier: Analysis"
  STR_SYNDICATE_BREACHER_ARMOR: "Syndicate Heavy Soldier: Analysis"
  STR_SYNDICATE_COMMANDO_ARMOR: "Syndicate Commando: Analysis"
  STR_SYNDICATE_SHADOWOP_ARMOR: "Syndicate Shadow Operative: Analysis"
  STR_SYNDICATE_PA_UNIT_ARMOR: "Syndicate Assault Trooper: Analysis"
  STR_SYNDICATE_MANAGER_ARMOR: "Syndicate Manager: Analysis"

