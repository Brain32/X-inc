  STR_WST_RIPPER03: "Потрошитель cкаут"
  STR_WST_RIPPER03_ARMOUR: "Потрошитель cкаут: Анализ"
  # ТЕРРОРИСТЫ - SiN
  STR_FAC_SIN_UFOPEDIA: "SiN"
  STR_FAC_SIN_UFOPEDIA_UFOPEDIA: "Террористическая организация, которую призирают все, но и в то же время, поддерживает большое количество мегакорпораций. Помимо штамповки кринджовых вербовочных видео, для промывки мозгов среди молодёжи Пустошей, они так же занимаются грабежами и убийствами граждан мегагородов и Земных правительств. Их структура больше похожа на частное военное формирование, нежели на сборище борцов за справедливость, т.к. набор в высшие ранги довольно строг и жесток."
