  # МЕГАПОЛ
  STR_AUTOCOP_UPED: "Автокоп"
  STR_AUTOCOP_UFOPEDIA: "Служить и защищать до гроба - вот их девиз. Эти железные шкафы из металла когда то были лучшими офицерами Мегапола. Но после, эм... несчастных случаев на работе, их остатки было решено кибернитизировать, что бы их навыки не пропадали напрастно. Конечно такие случаи относительно редки, т.к. проекты по кибернитизации дорогие. По сути - их броня это автоматизированная силовой костюм, который прекрасно защищает от пуль и дроби. Но излишняя электроника и сервоприводы, делают их почти бесполезными против Элекричества и ЭМИ излучения."
