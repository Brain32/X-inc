  STR_OLD_WOLRD_ENJOYER_NAME: "Ценитель Старого Мира"
  STR_OLD_WOLRD_ENJOYER_UFOPEDIA: "Нафига нужны все эти наворчиные стволы если старый-добрый Кольт 45-ого калибра ничем не хуже? К тому же, использование этого оружия вызывает у вас странное чувство настольгии, которого у вас никодгда небыло... Используйте довоенное оружие что бы блюсти Закон и порядок на Земле.{NEWLINE}{NEWLINE}Даёт +1 к Точности и Реакции поочередно.{NEWLINE}На V уровне увиличивает Концентрацию на 5.{NEWLINE}На X уровне даёт востановление +1 выносливости за ход и +10 к Храбрости. "

