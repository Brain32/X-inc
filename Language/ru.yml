  STR_MELEE_PSYCHO_NAME: "Психопат ближнего боя"
  STR_MELEE_PSYCHO_UFOPEDIA: "Вам ДЕЙСТВИТЕЛЬНО нравится приченять боль другим людям. Доставляйте правосудие используя нестондартное оружие ближнижнего боя по типу бит, топоров, ножей или кастетов.{NEWLINE}{NEWLINE}Четный уровень прибовляет +2 к выносливости.{NEWLINE} Каждый нечётный +1 к ОД.{NEWLINE} Пятый уровень даёт востановление +1 выносливости за ход.{NEWLINE}Десятый уровень даёт к +10 Храбрости"
