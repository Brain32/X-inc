  STR_FN_P90_NEO_UFOPEDIA: "Пистолет-пулемёт. Очень милый."
  STR_MAC12: "MAC12 & C.E.S."
  STR_MAC12_UFOPEDIA: "Пистолет пулемёт MAC12, с нелегальной моддификацей (Calculating Enhance System) обеспечивает стрелку лучший контроль над огнем во время длинных очередей. Мощный калибр .45 — это маленькая вишенка на торте, но дальность этой штуки оставляет желать лучшего."
