ru:

# ВЕРБОВКА
  STR_SOLDIER_M_RECRUITMENT: "Вербовка оперативников"
  STR_SOLDIER_M: "Оперативник"
  STR_SOLDIER_AI: "Боевой дроид"
  STR_BATTLE_DROIDS: "Боевые дроиды"
  STR_HUMANOID_AI_CORPSE: "Обломки дроида"
  STR_HUMANOID_DROID_UC: "ШАССИ ДРОИДА"
  STR_HUMANOID_DROID_UFOPEDIA: "Стандартное человекоподобное шасси дроидов"
  STR_HUMANOID_DROID_JETPACK_UC: "ШАССИ ДРОИДА/ДЖЕТПАК"
  STR_HUMANOID_DROID_JETPACK_UFOPEDIA: "Заменив кое какие элементы энергосистем дроидов используя гравимодуль, они теперь могут парить в воздухе!"
# БРОНЯ
  STR_ARMOUR: "СПЕЦБРОНЯ"
  STR_RUNNER_COAT: "Плащ"
  STR_RUNNERCOAT_UC: "ПЛАЩ"
  STR_RUNNERCOAT_UFOPEDIA: "Стандартный дресс код нашего оперативного отдела. Этот плащ сделан из суперволокна, которое, в теории, может остановить малокалиберные пули, но не ждите большего."
  STR_JUMPSUIT: "Комбинезон"
  STR_JUMPSUIT_UC: "КОМБИНЕЗОН"
  STR_JUMPSUIT_UFOPEDIA: "Лёгкая спецодежда сделаная из повсеместно используемого материала известного как 'Суперволокно'. Слой довольно смехотворный для того что бы считатся полноценной броней, но комбинезон довольно лёгкий и не сковывает движение оперативника, позволяя сохранять максимальную мобильность на поле боя."
  STR_BULDOZER_SUIT: "Бульдозер"
  STR_BULDOZER_SUIT_UC: "БУЛЬДОЗЕР"
  STR_BULDOZER_SUIT_STUDY: "Броня Бульдозер"
  STR_BULDOZER_SUIT_UFOPEDIA: "Тяжелый спец- костюм из пластистали, хорошо защищает от малокалиберных пуль дроби. Встроенный респиратор и примитивный прибор ночного видения помогает владельцу ореинтироватся в темноте."
  STR_DEFENDER_SUIT: "Циклоп"
  STR_DEFENDER_SUIT_UC: "ЦИКЛОП"
  STR_DEFENDER_SUIT_STUDY: "Броня Циклоп"
  STR_DEFENDER_SUIT_UFOPEDIA: "Пожалуй главное отличие этой брони это навароченого и дорогово визора, который помогает в прицеливании. Он позволяет владельцу быстро орентироватся и принимать решения в боевых ситуациях.{NEWLINE}Н/В: {ALT}14{ALT}"
  STR_DEFLECTOR_SUIT: "Силовая броня Дефлектор"
  STR_DEFLECTOR_SUIT_UC: "ДЕФЛЕКТОР"
  STR_DEFLECTOR_SUIT_UFOPEDIA: "Старая модель силовой брони разработанная ещё во время Первого Вторжения пршельцев. Невозможен бег."
  STR_SWAT_SUIT_UC: "СНАРЯЖЕНИЕ СПЕЦНАЗА"
  STR_SWAT_SUIT: "Снаряжение Спецназа"
  STR_SWAT_SUIT_UFOPEDIA: "Комплект современной брони силовых структур. Увесетсая панцерная броня с копмлексом продвинутой электронники делает её прекрасной персональной броней для боевых действий в городских условиях.{NEWLINE}Н/В: {ALT}16{ALT}"
  STR_SWAT_SUIT_STUDY: "Покупка cнаряжение cпецназа"
  STR_COMBAT_ARMOUR_MK1: "Боевая броня Mk1"
  STR_COMBAT_ARMOUR_MK1_UC: "БОЕВАЯ БРОНЯ МK1"
  STR_COMBAT_ARMOUR_MK1_UFOPEDIA: "Изготовленная из улучшенных полимеров и сплавов, эта броня является отличной защитой против мелкоколиберных пуль и малой дроби. Встроенный в визор прибор ночного видения позволяет хорошо ореинтироватся в ночное время суток.{NEWLINE}Н/В: {ALT}14{ALT}"
  STR_COMBAT_ARMOUR_MK1_STUDY: "Покупка боевой брони"
  STR_COMBAT_ARMOUR_UPGRATE_PROJECT: "Производство боевой брони Mk2"
  STR_COMBAT_ARMOUR_MK2: "Боевая броня Mk2"
  STR_COMBAT_ARMOUR_MK2_UC: "БОЕВАЯ БРОНЯ MK2"
  STR_IRONCLAD_ARMOR_PURCHES: "Покупка силовой брони Броненосец"
  STR_IRONCLAD_ARMOR: "Силовая броня Броненосец"
  STR_COMBAT_ARMOUR_MK2_UFOPEDIA: "Лёгкие пластины из пластистали повзволили уменьшить вес конструкции, не жертвуя защитными качествами брони. Улучшеная начинка визора немного помогает в прицеливании.{NEWLINE}Н/В: {ALT}16{ALT}"
  STR_CIV_VEST: "Гражданский Жилет"
  STR_CIVILVEST_ARMOUR_UC: "ГРАЖДАНСКИЙ ЖИЛЕТ"
  STR_CIVILVEST_ARMOUR_UFOPEDIA: "Простой бронежелет, который может позволить себе почти кто-угодно без лишней брехни с бюрократической машиной. Слой кевлара довольно смехотворный."
  STR_CIVIL_VEST_ARMOR_STUDY: "Покупка Граждан. жилета"
  STR_ARMOUR_SECVEST: "Защитный жилет"
  STR_SECVEST_ARMOUR_UC: "ЗАЩИТНЫЙ ЖИЛЕТ"
  STR_SECVEST_ARMOUR_UFOPEDIA: "Обзоведясь кое-какими знакомствами в Мегаполе, мы можем заказывать такие простенькие кевларавые жилеты. Слой довольной толстый что бы остновлять мелкокалиберный пули и дробь а шлем оборудован примитивным прибором ночного и теплового видения.{NEWLINE}Н/В: {ALT}10{ALT}"
  STR_ARMOUR_SECVEST_STUDY: "Покупка защит. жилета"
  STR_ICARUS_COAT: "Плащ Икарус"
  STR_ICARUS_COAT_UC: "ПЛАЩ ИКАРУС"
  STR_ICARUS_COAT_STUDY: "Плащ икарус"
  STR_ICARUS_COAT_UFOPEDIA: "Углубившись в дизайн панцерной брони, и долго пороботав над дизайном, иы смогли сделать компазитные палстины достаточно тонкими для того что бы их можно было скрытно носить под обычной одеждой. В свободное место мы смогли втюхать импланты и прочую электроннику."
  STR_TAURUS_ARMOUR: "Броня Телец"
  STR_TAURUS_ARMOUR_UC: "ТЕЛЕЦ"
  STR_TAURUS_ARMOUR_STUDY: "Броня Телец"
  STR_TAURUS_ARMOUR_UFOPEDIA: "Наша первая попытка спроектировать свою броню. Торс усилен толстым слоем аквапластика а шлем защищает от контузяхих атак."
  STR_JUMPSUIT_JETPACK_STUDY: "Покупка джетпака"
  STR_JUMPSUIT_JETPACK: "Джетпак"
  STR_JUMPSUIT_JETPACK_UC: "ДЖЕТПАК"
  STR_JUMPSUIT_JETPACK_UFOPEDIA: "Простой Джетпак для коммерческого использования. В основном используется для нудных повседневных дел, но мы могли бы использовать его в наши целях. Управление занимает один слот в руке, так что использование двуручного оружия будет проблематичным."
  STR_IRONCLAD: "Силовая броня Броненосец"
  STR_IRONCLAD_UC: "БРОНЕНОСЕЦ"
  STR_IRONCLAD_UFOPEDIA: "Популярная модель силовой брони для колониальной пехоты внешнего круга колонистов. Т.к. потребитель данного продукта имеет дело с фаной и ужасами глубин дальних планет, броня сделана так что бы хорошо отрожать укусы и режущие атаки, но не очень хорошо защишает от энергетического оружия.{NEWLINE}Бег невозможен.{NEWLINE}Н/В: {ALT}16{ALT}"
  STR_NIGHTOPS_BUY: "Покупка комбинизона ночной дозор"
  STR_NIGHTOPS_ARMOR: "Снаряжение Ночной Дозор"
  STR_NIGHTOPS_ARMOUR: "Броня Ночной Дозор"
  STR_NIGHTOPS_ARMOUR_UC: "НОЧНОЙ ДОЗОР"
  STR_NIGHTOPS_ARMOUR_UFOPEDIA: "Простой кевларовый бронежилет оборудаванный прибором ночного и теплового виденья. Бронежилет не очень толстый что бы выдержать даже винтовочный калибр, так что рекомендуется держать оперативников на растоянии.{NEWLINE}Н/В: {ALT}14{ALT}"
  STR_TEMPLAR_PA: "Силовая броня Тамплиер"
  STR_TEMPLAR_PA_UC: "ТАМПЛИЕР"
  STR_TEMPLAR_ARMOR_STUDY: "Проект сверх-тяжёлой силовой брони"
  STR_TEMPLAR_PA_UFOPEDIA: "Сверхтяжёлая силовая броня. Бег невозможен, как и присидание и движение боком. ОГРОМНАЯ цель. Разварот занимает 2 ОД."

# ТВОИ РОБОТЫ
  STR_MECHSUIT_ARMOR_UC: "МЕК/СКАУТ"
  STR_MECHSUIT_ARMOR_UFOPEDIA: "Базовая модель МЕК-робота для разведования местности."
  STR_SECBOT_MK1_BUY: "Покупка охранного дрона"
  STR_SECBOT_MK1: "Охранный Дрон Мк"
  STR_SECBOT_MK1_UC: "Охранный Дрон Мк1"
  STR_SECBOT_MK1_UC_UFOPEDIA: "Простой коммерческий охранный дрон."
  STR_SECBOT_BLACK_CORPSE: "Обломки охранного дрона"

# КОМПОНЕНТЫ
  STR_POWER_ARMOR_PARTS: "Детали силовой брони"
  STR_POWER_ARMOR_PARTS_UFOPEDIA: "Различные детали необходимые для создания механизированной брони."
  STR_POWER_CELL: "Блок питания"
  STR_POWER_CELL_UFOPEDIA: "Элериевая энергетическая ячейка для питания различных элементов по типу силовой брони или тяжелого оружия."
  STR_SC_WIRE: "Сверхпроводник"
  STR_SC_WIRE_UFOPEDIA: "Этот материал предназначен для использования при производстве авиатехники или различного типового лазерного оружия."
  STR_OPTRONIC_PARTS: "Оптронные детали"
  STR_OPTRONIC_PARTS_UFOPEDIA: "Сердце любого продвинутого девайса, которое вместо электричества использует свет. Применялось пришельцами во время вторжения в качестве компонента навигационного блока."
  STR_XENOLITE_BLOCK: "Ксенолитовый блок"
  STR_XENOLITE_BLOCK_UFOPEDIA: "Разумный кристалл внеземного происхождения, структура которого напоминает человеческий мозг со своей системмой нейронов и микропроводников. Обычно такие блоки довольно редкие и используются для конструкции ИИ в аэрокарах или военных и потребительских дронов."
  STR_DURATHREAD: "Суперволокно"
  STR_DURATHREAD_UFOPEDIA: "Очень крепкая ткань, используется в производстве одежды и защитного оборудования. Особая обработка даёт ей особые защитные свойства против электричества и химикатов."
  STR_AQUA_PLASTICS: "Аквапластик"
  STR_AQUA_PLASTICS_UFOPEDIA: "Повсеместно используется в производстве различных инстурментов и панцирной брони."
  STR_GRAV_MODULE: "Гравитационный модуль"
  STR_GRAV_MODULE_UFOPEDIA: "Небольшой грави модуль, используется в производстве левитационной брони и транспорте."

# ОРУЖИЕ - ВСТРОЕННОЕ
  STR_MECHA_GRABBER: "Силовой ухват"
  STR_MECHA_RL: "Ракетница МЕК"
  STR_MECHA_RL_ROCKET: "Комплект ракет"
# ОРУЖИЕ - БЛИЖНИЙ БОЙ
  STR_UNARMED_BAISIC: "Кулаки"
  STR_UNARMED_BAISIC_UFOPEDIA: "Если под рукой ничего нет, почему бы не использовать свои же руки? Сила и точность зависят от навыка ближнего боя, силы и реакции."
  STR_UNARMED_ROBO: "Кулаки (Робот)"
  STR_UNARMED_ROBO_UFOPEDIA: "Дроиды тоже могут дратся но не так точно как люди. Зато, при атакае они наносят немного больше оглушающего урона."
  STR_KNUCKLES: "Кастет"
  STR_KNUCKLES_UFOPEDIA: "Популярное среди головорезов всех мастей уличное оружие ближнего боя. Помещается в карман и разбивает морды не хуже всяких дубин. Требует от бойца определённый снаровки и силы."
  STR_STUN_BATON: "Полицейская дубинка"
  STR_STUN_BATON_UFOPEDIA: "Несмотря на то, что мы являемся частной наёмнической организацией, Мегапол всё же дал добро на пользование такими электро-дубинками. Разряд не летальный но всё же немного вредит здоровью цели."
  STR_SHIV: "Заточка"
  STR_SHIV_UFOPEDIA: "Небольшой обрывок метала заточеный наноссить небольшие но болезненые раны."
  STR_STABKNIFE: "Тычковый нож"
  STR_STABKNIFE_UFOPEDIA: "Эта особая разновидность ножа больше полагается на силу владельца нежели на его навык."
  STR_MACHETE: "Мачете"
  STR_MACHETE_UFOPEDIA: "Широкий и длинный кинжал предназначавшийся для резки растительности."
  STR_KNIFE_BANDIT: "Бандитский нож"
  STR_KNIFE_BANDIT_UFOPEDIA: "Этот большлой нож используется рейдерами и бандитами. Требует от владельца решимости."
  STR_COMBAT_KNIFE: "Боевой нож"
  STR_COMBAT_KNIFE_UFOPEDIA: "Качественно собранный стальной нож. Для эффективного применения требует от владельца силы и навыка ближнего боя."
  STR_PIPE: "Труба"
  STR_PIPE_UFOPEDIA: "Стальная труба которая может стать импровизированной дубинкой, если под рукой нету ничего получше."
  STR_CROWBAR: "Монтировка"
  STR_CROWBAR_UFOPEDIA: "Излюблинное оружие выпускников Массачусетского технологического института."
  STR_WRENCH: "Гаечный ключ"
  STR_WRENCH_UFOPEDIA: "Байки колониальных морпехов гласят, что когда-то, точно таким же разводным ключём, безимянный солдат в одиночку угандошил полчища мутантов и спятивших кибргов на борту одного из мега звездалёта. Конечно вояки могут приврать, но то чему точно вряд-ли солжёшь это плотный кусок метала который раздробит вашу черепушку в два счёта."
  STR_CUTLASS: "Сабля"
  STR_CUTLASS_UFOPEDIA: "Прикольного вида сабля которой орудывали древние бандиты. На удивление всё ещё довольно эффективна."
  STR_GOLF_STICK: "Клюшка для гольфа"
  STR_GOLF_STICK_UFOPEDIA: "Клюшка для гольфа. Старнный выбор для ближнего боя, но не менее эффективный"
  STR_BATTO: "Бейсбольная бита"
  STR_BATTO_UFOPEDIA: "В бывалые времена использовалась для популярной игры с отбиванием мяча. Сейчас же популярна среди головорезов для отбивания черепов, причём довольно эффективно !"
  STR_FIRE_AX: "Пожарный топор"
  STR_FIRE_AX_UFOPEDIA: "Топор для снесения преград или обломков при пожаре."
  STR_CARBONBLADE: "Карбоновое лезвие"
  STR_CARBONBLADE_UFOPEDIA: "Нынче популярное среди шпаны желающих стать уличными самураем клинок, изготовленный из карбоновых волокон."
  STR_CYBER_SWORD: "Электро Меч"
  STR_CYBER_SWORD_UFOPEDIA: "Популярная модель электро меча работающая от небольшой элеривой батарейки. Режит броню как масло"
  STR_HAMMER: "Кувалда"
  STR_HAMMER_UFOPEDIA: "Если тебе что-то мешает на пути, снеси это к ебеням собачим."
  STR_CYBER_KATANA: "Электро Катана"
  STR_CYBER_KATANA_BUY: "Покупка электро меча"
  STR_CYBER_KATANA_UFOPEDIA: "Технологичная катана, производимая в Нео Ярпонии. Отлично режит броню"
  STR_SUPER_HAMMER: "Супер Кувалда"
  STR_SUPER_HAMMER_UFOPEDIA: "Тяжёлая бандура, с пневмоусилителем. В основоном повсиместно используется как инструмент."
  STR_CHAINSAW: "Бинзопила"
  STR_CHAINSAW_UFOPEDIA: "Старый инструмент для рези дерева."
# ОРУЖИЕ - ПИСТОЛЕТЫ
  STR_LIBIRATOR_JUNK: "Самопальный пистолет"
  STR_LIBIRATOR_JUNK_UFOPEDIA: "Пистолет сделанный на коленке мастеровыми пустошей, из подручного хлама (Как обычно это водится в Пустошах). Сборка этой пукалки настолько отвратиельна, что из неё еле-еле можно в кого-нибуть попасть. Единственное её достоинсто - коспактность и маленький размер. Идеално для миссий под прикрытием."
  STR_10MM_TRIPLE_CLIP: "Патроны 10 ММ/ББ"
  STR_CIV_PISTOL_LT: "Корманный Пистолет"
  STR_PISTOL_LT_CLIP: "Маг. Карманного Пистолета"
  STR_PISTOL_LT_CLIP_SLAYER: "Маг. Карманного Пистолета/УБОЙ"
  STR_SMG_LINDA: "ПП «Линда»"
  STR_SMG_LINDA_UFOPEDIA: "ПП гражданской модели использует магазины 9-мм."
  STR_CIV_PISTOL_LT_UFOPEDIA: "Успешная попытка МилиТек покорить гражданский рынок. Этот небольшой пистолет «UTF-57» помешается в корман и очень прост в использвании. Для изысканых любителей насилия пистолет поддерживает убойные боепрепасы с менее вместительным магазином."
  STR_CIV_PISTOL_HW: "Тяжелый Короткоствол"
  STR_PISTOL_HW_CLIP: "Маг. Тяж. Короткоствол"
  STR_CIV_PISTOL_HW_UFOPEDIA: "Конструкция этого мини-пистолета позволяет использовать более тяжелые боепрепасы, хотя он немного медленее."
  STR_MILITECH_PISTOL_HP93S: "Пистолет MiliTech P93S"
  STR_MILITECH_PISTOL_HP93S_CLIP: "Маг. MiliTech P93S"
  STR_MILITECH_PISTOL_HP93S_UFOPEDIA: "Если вам нужен верный и надёжный пистолет без всяких навороченных штучек, то у корпорации «MiliTech» есть то что вам нужно! Этот надёжный пистолет используется практически всеми кто живёт в пределах мега-городов, и является «золотой серединой» среди пистолетов."
  STR_COLT_KJ58S: "Кольт KJ58S"
  STR_COLT_KJ58S_CLIP: "Маг. KJ58S"
  STR_COLT_KJ58S_UFOPEDIA: "Ново реорганезованная компания «Кольт», совместно с правительством США, c гордостью представляет свой новый пистолет модели KJ-58-S. Ощутимая мощность этого ствола, прекрасно подходит для нейтрализатции более плтоно бронированных противникв."
  STR_CHEAP_3DPISTOL: "Слоут-О'-Матик"
  STR_CHEAP_3DPISTOL_UFOPEDIA: "Нехватает зелени на нормльный ствол? Этот дешёвый одноразовый пистолет обоёдтся по корману любому члену социальной пиромиды! Напечатонный на 3D принтере, этот кусок пластика, имеет тенденцию заедать, ломатся и разваливатся прямо в руках у владельца. Даже не заекайтись о мощности этой пукалки. Перезарядка невозможна."
  STR_BANDIT_REVOLVER: "Бандитский револьвер"
  STR_BANDIT_REVOLVER_AMMO: "Барабан банд. револьвера"
  STR_BANDIT_REVOLVER_UFOPEDIA: "Несмотря на свой почётный возраст, этот револьвер все ещё мошный. Однако его барабаный механизм делает перезарядку занудной и долгой."
  STR_PISTOL_10MM: "Бандитский пистолет"
  STR_PISTOL_10MM_MAG: "Маг. Бандитского Пистолета"
  STR_PISTOL_10MM_MAG_AA: "Маг. Бандитского Пистолета/ББ"
  STR_PISTOL_10MM_UFOPEDIA: "Зверского вида полуавтоматический пистолет собранный в закаулках Пустошей. Несмотря на своё происхождение, он хорошо собран и имеет впечатляющую точность и останавливающую способность."
  STR_D_EAGLE: "Пистолёт «Орёл свободы»"
  STR_D_EAGLE_CLIP: "Маг. «Орёла свободы»"
  STR_D_EAGLE_UFOPEDIA: "Американская классика и настоящий риаритет! Разработанный в Израиле этот пистолет, несмотря на популяризацию в поп-культуре и фильмах, чертовский непрактичный и не удобный. Но несмотря на всё это, некоторые коликционеры и начальники охранных компаний готовы отвалить немало зелени заполучить такой ствол."
  STR_SCOPED_MAGNUM: "Магнум с прицелом"
  STR_SCOPED_MAGNUM_DRUM: "Спидлоадер Магнума с прицелом"
  STR_SCOPED_MAGNUM_UFOPEDIA: "Увесистый револьвер, с простым калиматронным прицелом. Калибр очень мощный что бы пробить простоые видо брони, хотя размер боезапаса довольно херовый. Патроны посталяются вместе с удобным спидлоадером на 5 патронов. Как удобно!"
  STR_MAGNUM: "Кольт «Питон»"
  STR_MAGNUM_UFOPEDIA: "Живая классика. Этот обычный револьвер был произведён задолго до вторжения пришельцев. Несмотря на ветхость, он элегантен в своей сборке и обладает убойной мощью."
  STR_COLT45: "Кольт 45."
  STR_COLT45_CLIP: "Маг. Кольта"
  STR_COLT45_CLIP_AA: "Маг. Кольта/ПС"
  STR_COLT45_CLIP_EXT: "Увел. Маг. Кольта"
  STR_COLT45_CLIP_AA_EXT: "Увел. Маг. Кольта/ПС"
  STR_COLT45_UFOPEDIA: "Элегантное оружие из более цивилизованной эпохи⁠⁠. Этот надёжный пистолет является излюбленым личным оружием среди контрабандистов. Точный, мощный и простой в обращении пистолет."
  STR_REBEL_COLT45: "Продвинутый Кольт 45."
  STR_REBEL_COLT45_UFOPEDIA: "Изготовленый Повстанцами, этот модифицированный M1911 может вести автоматический огонь благодоря своей улучшенной констркции."
  STR_HB_GAUSS_PISTOL: "Гаусс Пистолет"
  STR_HB_GAUSS_PISTOL_CLIP: "Маг. Гаусс Пистолет"
  STR_HB_GAUSS_PISTOL_UFOPEDIA: "Довоенная модель гаусс писолета."
  STR_AUTO9_PISTOL: "Пистолет Хищник"
  STR_AUTO9_PISTOL_UFOPEDIA: "Поицейский пистолет. Пожалуйста верните обратно в ближайший офис Мегапола."
  STR_AUTO9_PISTOL_CLIP: "Маг. Хищника"
  STR_LASER_PISTOL_MIB: "Лазерный пистолет"
  STR_LASER_PISTOL_MIB_UFOPEDIA: "Лазерное оружие популяпной модели."
  STR_LASER_PISTOL_MIB_CLIP: "Бат. лазерного пистолета"
  STR_LASER_PISTOL_MIB_CLIP_HI: "Бат. лазерного пистолета/ПРО"
# ОРУЖИЕ - ВИНТОВКИ?
  STR_G11: "G11"
  STR_G11E: "G11E"
  STR_G11_CLIP: "Обойма G11"
  STR_G11_UFOPEDIA: "Винтовка довоенного образца. Сложный ударно-спусковой механизм и дороговизна производства патронов сделала её непопулярной в XX веке. Но в наши дни, эта винтовка ценится среди опытных бойцов."
  STR_G11E_UFOPEDIA: "Продвинутая версия G11 оснащена автоматическим стабилизатором, баллистическим компьютером и оптронным прицелом. Короче - целься быстрее и обращай меньше внимания на отдачу! К сожелению, данный подвид винтовок довольно редкий, и скорее всего был кем-то сделан на заказ."
  STR_JUNKY_SAWED_OFF_UFOPEDIA: "Двустволка, широко используемая жителями Пустошей. При сборке этого ветхого ружья использовались низкопробные детали. Но не похоже что бы создателя это волновало."
  STR_JUNKY_SAWED_OFF: "Дряный обрез"
  STR_DOUBLE_BARRELED_BUCKSHOT: "Картечь (.8г)"
  STR_DOUBLE_BARRELED_BUCKSHOT_SLUG: "Картечь (.6г)"
  STR_TEC9: "Гетто ПП"
  STR_TEC9_CLIP: "Маг. 9мм ПП"
  STR_TEC9_UFOPEDIA: "Ржавый пистолет-пулемет под патрон 9х19 мм. Популярен, как следует из названия, среди жителей гетто."
  STR_OLD_RIFLE_M16: "Винтовка Мусорщиков"
  STR_RIFLE_M16_CLIP: "Маг. М16"
  STR_OLD_RIFLE_M16_UFOPEDIA: "Единственный плюс этой склееной кое-как винтовки - отсутвие электронного замка на спусковом механизме. В остольном же эта винтовка уступает даже гражданским аналагам."
  STR_HUNTING_RIFLE_CLIP: "Обойма охотничьего ружья"
  STR_OLD_HUNTING_RIFLE: "Охотничье ружье"
  STR_OLD_HUNTING_RIFLE_UFOPEDIA: "Слегка потрепанные но очень простое и надёжное ружьё. Требует от стрлка терпения но результат стоит того."
  STR_OLD_SHOTGUN: "Старый дробовик"
  STR_OLD_SHOTGUN_SHELLS_SLUG: "Патр. Тяж. Дробовика/ББ"
  STR_OLD_SHOTGUN_SHELLS: "Патр. Тяж. Дробовика"
  STR_OLD_SHOTGUN_UFOPEDIA: "Этот дробовик определенно знавал лучшие времена."
  STR_PS94: "PS94"
  STR_PS94_UFOPEDIA: "Двухзарядное устройство, которое можно с лёгкостью положить в карман. Выпускает небольшой плазменный заряд, но имеет ограниченную дальность действия."
  STR_LASER_CIVIPHASER: "Корманный лазер"
  STR_LASER_CIVIPHASER_UFOPEDIA: "Портативное лазерное оружие или в народе просто 'Фазер'. Имеет неограниченый боезапас, но наносимиый урон не впечатляет. Подходит для отпугивания шпаны или мелких мутантов."
  STR_BLACKOPS_COMPACT: "Синдикат-Компакт"
  STR_BLACKOPS_COMPACT_CLIP: "Маг. Синдикат-компакт"
  STR_BLACKOPS_COMPACT_CLIP_AA: "Маг. Синдикат-компакт/ПС"
  STR_BLACKOPS_COMPACT_UFOPEDIA: "Разработанный по спецзаказу агентов Синдиката - этот качественно собранный пистолет настолько мал, что прекрасно подходит для миссий под прикрытием."
  STR_PISTOL: "Пистолет БО"
  STR_PISTOL_UFOPEDIA: "Стандартный 10-ти миллиметровый пистолет корпорации БлэкОпс. Оборудован лазерным целуказателем."
  STR_SMART_PISTOL: "Смарт Пистолет БО"
  STR_SMART_PISTOL_UFOPEDIA: "Встроенная электронная начинка этого пистолета позволяет владельцу быстрее целиться и вести огонь в полуавтоматическом режиме."
  STR_BLACKOPS_COMMANDO: "БэлкОпс Коммандо"
  STR_BLACKOPS_COMMANDO_CLIP: "Маг. БО Коммандо"
  STR_BLACKOPS_COMMANDO_CLIP_AA: "Маг. БО Коммандо/ПС"
  STR_BLACKOPS_COMMANDO_UFOPEDIA: "Конструкция этого мощного пистолета была позаимтсвована у довоенного Дезерт Игл-а. Несмотря на все усилия БлэкОпс устранить недостатки предшественника, пистолет всё ещё имеет ощутимую отдачу и небольшую вместимость магазина. Но даже несмотря на это, пушка все ещё круто выглядит в руках матёрых морпехов."
  STR_BLACKOPS_MAGNUM: "Магнум БлэкОпс"
  STR_MAGNUM_ROUNDS: "Спидлоадер магнума"
  STR_MAGNUM_ROUNDS_AA: "Спидлоадер магнума/ПС"
  STR_BLACKOPS_MAGNUM_UFOPEDIA: "Данный подвид револьвера имеет встроенный лазерный прицел и примитивный стабилизатор."
  STR_RIFLE: "Винтовка БлэкОпс"
  STR_RIFLE_UFOPEDIA: "По слухам, похожую винтовку оперативники X-Com использовали против инопланеных захватчиков во время вторжения. Правда ли это или тупая коммерческая уловка решать вам, но винтовка облодает неполохими характеристиками на дальней и среденй дистанции."
  STR_BLACKOPS_SHORTRIFLE: "Карабин БлэкОпс"
  STR_BLACKOPS_SHORTRIFLE_UFOPEDIA: "Помесь карабина и винтовки. Этот ствол использует те же боеприпасы, что и стандартная винтовка БлэкОпс, но точность на дальних дистанциях отсавляет желать лучшего."
  STR_RIFLE_CLIP_AA: "Магазин к винтовке/ПС"
  STR_BLACKOPS_ADV_SMG: "Продвинутый ПП БлэкОпс"
  STR_BLACKOPS_ADV_SMG_CLIP: "Маг. ПП БлэкОп"
  STR_BLACKOPS_ADV_SMG_AA_CLIP: "Маг.ПП БлэкОп/ПС"
  STR_BLACKOPS_ADV_SMG_UFOPEDIA: "Компактный, отличный темп стрельбы на ближней дистанции и набор датчиков для улучшеной точности. Что ещё нужно для счастья?"
  STR_BO_LMG: "Ручной пулемёт «БлэкОпс»"
  STR_BO_LMG_CLIP: "Барабан РП «БлэкОпс»"
  STR_BO_LMG_CLIP_AP: "Барабан РП «БлэкОпс»/ББ"
  STR_BO_LMG_CLIP_AA: "Барабан РП «БлэкОпс»/ПС"
  STR_BO_LMG_UFOPEDIA: "Тяжелая версия винтовки БлэкОпс. Оборудованный сошкой и примитивным стабилизатором это оружие идеалено для ведения подавляющего огня."
  STR_BO_SNIPER_RIFLE: "Снайперская Винтовка «БлэкОпс»"
  STR_BO_SNIPER_RIFLE_CLIP: "Маг. Снайп. Винтовки «БО»"
  STR_BO_SNIPER_RIFLE_CLIP_AP: "Маг. Снайп. Винтовки «БО»/ББ"
  STR_BO_SNIPER_RIFLE_CLIP_AA: "Маг. Снайп. Винтовки «БО»/ПС"
  STR_BO_SNIPER_RIFLE_UFOPEDIA: "Это оружие является сбалансированным выбором среди снайперских винтовок. Точная и относительно мощная на дальних дистанциях."
  STR_BO_HEAVY_SNIPER_RIFLE: "Тяж. Снайперская винтовка"
  STR_BO_HEAVY_SNIPER_RIFLE_CLIP: "Маг. Тяж. Снайп. «БО»"
  STR_BO_HEAVY_SNIPER_RIFLE_CLIP_AP: "Маг. Тяж. Снайп. «БО»/ББ"
  STR_BO_HEAVY_SNIPER_RIFLE_CLIP_AA: "Маг. Тяж. Снайп. «БО»/ПС"
  STR_BO_HEAVY_SNIPER_RIFLE_UFOPEDIA: "Состоящая на вооружении у элитных подраздилений Синдиката, эта крупнокалиберная снайперская винтовка оборудована целым набором дорогой электроникой, которая помогает стрелку в прицеливании."
  STR_RIFLE_M16: "Винтовка М16"
  STR_RIFLE_M16_UFOPEDIA: "В довоенное время использовались военными по всей Земле. В наше время, морально устарела и является не более чем реаритетом нежили служебной винтовкой."
  STR_RIFLE_VHS: "Винтовка VHS"
  STR_RIFLE_VHS_UFOPEDIA: "Французская Винтовка комплектации булл-пап."
  STR_RIFLE_M16_SCARFACE: "Продвинутая Эм-Ка"
  STR_RIFLE_M16_SCARFACE_UFOPEDIA: "Маленький друг контрабандистов. Несмотря на свою предвзятость контрабандистов к инаплонетным технологиям, эта пушка оборудована набором датчиков и оптронным прицелом. Конструкция из пластали увеличивает темп стрельбы, а подствольный гранатамёт является прекрасным дополнением для деликатных ситуаций."
  STR_RIFLE_GL_M16: "Подствольный гранатамёт M16"
  STR_RIFLE_GL_M16_UFOPEDIA: "Подствольный гранатамёт винтовки контрабандистов. Использует гранаты от обычного 40мм гранатамёта."
  STR_SMARTRIFLE: "Смарт-Винтовка"
  STR_SMARTRIFLE_UFOPEDIA: "В эту великолепную винтовку встроен оптронный компьютер и модуль самонаведения который помгает владельцу в прицеливании. Высокий темп стрельбы подымает летальность этого ствола в разы."
  STR_SMARTRIFLE_CLIP: "Маг. Смарт-винтовки"
  STR_SMARTRIFLE_CLIP_AA: "Маг. Смарт-винтовки/ПС"
  STR_FLARE_PISTOL: "Сигнальный Пистолет"
  STR_FLARE_PISTOL_UFOPEDIA: "Простой самозоорядный пистолет. Стреляет сигнальными ракетами, для подачи сигналов бедствия... ИЛИ освещения и поджигания местности. Трудно поверить что даже спустя почти 300 лет, конструкция этого пистолета почти не изменилась."
  STR_FLARE_PISTOL_CLIP: "Ракета сигнал. пистолета"
  STR_FLARE_PISTOL_SUPER_CLIP: "Торпеда сигнал. пистолета"
  STR_TASER: "Тазер"
  STR_TASER_CLIP: "Картридж тазера"
  STR_TASER_SUPER_CLIP: "Ультра картридж тазера"
  STR_TASER_UFOPEDIA: "Нелетальное устройство способное отрубить плохобронировоного головореза."
  STR_SCOPED_HUNTING_RIFLE: "Снайперское ружье"
  STR_SCOPED_HUNTING_RIFLE_UFOPEDIA: "Отполированное охотничье ружье на которое установлен добротный оптический прицел."
  STR_COWRIFLE: "Рычажная Винтовка"
  STR_COWRIFLE_UFOPEDIA: "Весьма интересная, для Пустошей, винтовка с трубчатым подствольным магазином. Опытный и ловкий стрелок, может опустошить почти весь магазин одним залпом!"
  STR_COWRIFLE_AMMO: "Патр. Рычажной винтовки"
  STR_COWRIFLE_AMMO_AA: "Патр. Рычажной винтовки/ПС"
  STR_OICW:  "Винтовка OICW"
  STR_OICW_UFOPEDIA: "Даже до Третей мировой войны дизайн этой винтовки был слишком мутарным для массового производства. Но высокая точность и встроенный гранатмёт позволяют этой винтовке быть гибкой потчти в любых военных ситуациях."
