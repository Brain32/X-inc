  STR_M52S_AJAX_RIFLE: "Винтовка M52S-AJAX"
  STR_M52S_AJAX_RIFLE_CLIP: "Маг. M52S-AJAX"
  STR_M52S_AJAX_RIFLE_UFOPEDIA: "Изящная штурмовая винтовка M52S-AJAX, пользуется популярностью среди вооруженных сил и частных полицейских подразделений по всему земному шару. Гладкий спусковой механизм и коллиматорный прицел обеспечивают почти идеальный контроль ведения огня."
  STR_BATTLE_RIFLE: "Военная винтовка"
