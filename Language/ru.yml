  STR_SMUGGLER_GOON: "Контрабандист-головорез"
  STR_SMUGGLER_GOON_UFOPEDIA: "Зарабатывают на хлеб перевозкой дорогостоящего барахла по всему Земному шару всяким доходягам, корпорационным воратилам или даже пердставителям различных колоний. Эти члены контрабандистов низшего ранга, но не стоит их не дооценивать, т.к. они хорошо знают своё дело и неплохо стреляют из старого оружия. Их старомодный костюм прошлого миллениума не даёт никакой такического приемущества кроме как подчекркнуть свою вычурность."
