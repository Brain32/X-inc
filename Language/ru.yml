  STR_FACTIONS_UC: "ФРАКЦИИ и ПРОЧЕЕ"
  STR_FAC_RAIDERS_RIPPERS: "Клан рейдеров - Потрошители"
  STR_FAC_RAIDERS_RIPPERS_UPED: "Клан рейдеров - Потрошители"
  STR_FAC_RAIDERS_RIPPERS_UFOPEDIA: "Потрошители - одна из многочисленых бандистких групировок Пустошей. В основном состит из различных отбросов обшества и даже завербованых граждан Мегапрайма. По сути - Потрошители являются полу-военной организайей с нотками анархизма, т.к. не всегда имеют общего лидера который курирует их дейтельноситю. Занимаются грабежами, разарением частных ферм и иногда редкими набегами на транспортные ховеркары различных корпораций."
