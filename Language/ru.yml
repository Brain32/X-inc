  STR_SMUGLERS_GUNS: "Вооружение контробандистов"
  STR_SMUGLERS_GUNS_UFOPEDIA: "Опросив некоторых челнов и изучив их вооружение мы выяснели что в своих операциях контрабандисты используют старое но хорошо изготовленное довоенное вооружение, скорее всего собранное на 3D принтере. Если нам удастся отследить подобные места, то мы могли бы заполучить в себе в распоряжение схеми и чертежы производства подобных стволов."
  STR_SMUGLERS: "Контрабандисты"
  STR_SMUGLER: "Контрабандист"
  STR_FAC_SMUGLERS: "Фракция - контрабандисты"
  STR_FAC_SMUGLERS_UFOPEDIA: "Одно из ответвлений земной мафии занимающеяся нелегальной перевозкой наркоты, оружия и разного барохла по всей планете. Их групировки состоят из отчаянных людей которым докучила нудная жизнь в мега-городах. Несмотря на их дуратский прикид - эти ребята решительны, смелы и хорошо вооружены. В своих перевозках контрабандисты не используют двигатели на элеривой тяги, по этому отследить их будет не просто."
  STR_SMUGLERS_BELIVES: "Идеалы Контрабондистов"
  STR_SMUGLERS_BELIVES_UFOPEDIA: "Бла-бла что то по поводу Полиции Маями и Довоенный образ жизни."
  # БАЙКЕРЫ
  STR_BIKERS: "Байкеры"
  STR_BIKERS_UFOPEDIA: "Группа анархистов которые не привыкли подчинятся каким-то там правилам или законом. В основном водятся маленькими группами и разъезжаут по Пустоши, иногда навещая Мегапраймы что бы пополнить запасы, либо побуянить в местных барах."
  # РЕЙДЕРЫ ПОТРОШИТЕЛИ
