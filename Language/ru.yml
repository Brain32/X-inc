  STR_GNN_NEWS_004: "Теневые новости"
  STR_GNN_NEWS_005: "Теневые новости"
  STR_GNN_NEWS_006: "Теневые новости"
  STR_GNN_MURDER_1_DESCRIPTION: "{NEWLINE}Прошлым утром, на одной из заброшенных свалок Мегапрайма {0} было найдены трупы трёх видимых делателей по борьбе с коррупцией в высших эшелонах власти. Мегапол опровергает версию о политическом убийстве, заявив что данным лицам следовало бы тратить больше денег на собственную безопасность нежели на глупые вещи вроде борьбы с коррупцией."
  STR_GNN_MURDER_2_DESCRIPTION: "На прошлой неделе, был найден труп журналистки причастной к расследованию на одном из предприятии «Дзайбацу». Её череп был проломлен а на теле были найдены следы изнасилования. На недавней конференции представительница корпорации «Дзайбацу» с сияющей улыбкой на лице прокомментировала данное событие и посоветовала медиа компаниям меньше обращать внимания на обычные нападения головорезов."
  STR_GNN_MURDER_3_DESCRIPTION: "{NEWLINE}Прошлым вторником произошло выступление эко-активистов в музее Мегапрайма {ALT}{0}{ALT}. Протестующее облили красокй древний артифакт нйденый в солничной системме Тау Кита - 12, в знак протетса против использования яндерной энергии в варп двигателях. Руководитель выстовки, который самолично убил хулиганов на глазах у ликующей публики, прокоментировал этот инцидент как акт неуважения в сторону гильдии астронавтов и будет требовать копинсации с семей погибших за порчу дорого имущества."
  STR_GNN_EXPLOTION_1_DESCRIPTION: "{NEWLINE}... К другим новостям. Прошлим вторником В одном из секторов Мегапрайма {0} произошёл взрыв в жилом комлексе. Жители и потерпевшие утверждают что пару дней назад видели людей и фургоны с подозрителным оборудованием городостроительной компании «Констрактион Инк». Представитенли компании утверждают что снос здания был заранее запланирован и зараниее оговоёрн местынми власями. Руковдство Мегапола пообещало разобратся в этом деле в кратчайшие сроки."
  STR_GNN_EXPLOTION_2_DESCRIPTION: "...и к другим новостям! Вчера утром было совершен террористический акт в одном секторов Мегапрайма {ALT}{0}{ALT}. Сепаратисты устроили серию взрывов в жилом районе, десятки людей погибли и сотни пострадали. Мегапол раследует этот бесчеловечный акт, подозриваемые опрашиваются и уже задержены.{NEWLINE}А эта новасть была представлена вам сетью ресторанов корпорации центральной Европы «Чырвоны-Куток».{NEWLINE}«Ешь до отвала пока не взорвешся!»"
  STR_GNN_SIN_TERROR_1_DESCRIPTION: "{NEWLINE} Ожесточённые бои произошли в городе {0} между силовыми структурами и террористической групировкой «SIN». Силовики Мегапола понесли потери, но смогли сдержать погромы терророристов. Один из анонимных солдат сообщает что некоторые атакующие имели продвинутые виды вооружения и брони."
  STR_GNN_SIN_AD_1_DESCRIPTION: "{NEWLINE} ...И этот блок новостей был спонсирован  «Кровавым».(Голос сменяется мужским диктором) Каждую собботу. В 11:00. Мы Делаем ИСТОРИЮ в мире равзлекталеньй индустрии! Мы берём двадтцать заключёных недавно освобожденных по условно-досрочному, даём им винтовки, пулемёты и ракетные устновкию и заставляем их бится насмерть! Это реалити-шоу изменившее "
