  STR_GANG_HR_TAKEOVER_ALERT: "Чистка притона"
  STR_GANG_HI_RISE_HOUSE_TAKEOVER_BRIEFING: "Мегапол связался с нами и предложил нам работу. В этом секторе мага города образавалось сборище обдолбаных городских гловорезов которые нехотять свалить отсюда по хорошему. Почему бы не приподать этим ублюдкам урок и не вынести их из этого здания ногами вперёд? К тому же, это будет неплохой пиар ход нашего агенства!"
