  STR_MILITECH_SMG_CLIP: "Маг. ПП Милитек"
  STR_MILITECH_SMG_AA_CLIP: "Маг.ПП Милитек/ПС"
  STR_MILITECH_SMG_UFOPEDIA: "Пистолет пулемёт корпорации Милитек. Хорош пробивает броню. Смертоносен в руках опытного оперативника."
  STR_SMG_SMARTLOCK: "ПП Смарт лок"
  STR_SMG_SMARTLOCK_UFOPEDIA: "ПП напичканный оптроникой и спецально настроеным ИИ, для помощи в стрельбе, даже полным чайником. В противовес - оружие стреляет мелкокалиберными патронами 9x19 мм, что понижает летальность этого оружия."
