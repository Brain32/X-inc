  STR_MEDI_PATCH: "Мед-пластырь"
  STR_MEDI_PATCH_UFOPEDIA: "Пластырь специального назначения корпорации «МедТек». При нанесении на рану вводит комплекс химикатов, которые останавливают кровоизлияние. Можно использовать на себе."
  STR_ADV_MEDIPACK: "Продвинутый медпакет"
  STR_ADV_MEDIPACK_UFOPEDIA: "Устройство начинённое разлиичными приблудами для обработки пулевых ранений и ожогов от энергооружия."

  STR_GOLDEN_DRAGONS: "Сигареты золотой дракон"
  STR_GOLDEN_DRAGONS_UFOPEDIA: "Сигареты популярной марки золотой дракон."
  STR_PIZZA_SLICE: "Кусок пиццы"
  STR_PIZZA_SLICE_UFOPEDIA: "Сыр, пепперони, томатный соус, немного припарвы оригано и... неизвестный состав теста. Этот загадочный подарок был доставлен нам прямо у входа в базу, что настораживет, ведь каму-то известно местоположение нашей базы! Но кому взбрело в голову доставлять пиццу в Пустошь хрен знает куда? Обнадёживает лишь то, что в эту эру синтетических помоев не перевелись ещё настоящие повора, которые используют натуральные продукты."

# ПРОЧАЯ ЭКИПИРОВКАучён
  STR_PEPPER_GUN: "Перцовый пистолет"
  STR_PEPPER_GUN_UFOPEDIA: "В наше нелёгкое время не каждому удаётся получить лицензию на ношение огнестрельного оружия, так что некоторые гражднские используют это нелетальное устройтсво которое наполнено перцовым газом. При попадании уменьшает Очки Действия (ОД) и приченяет оглушающий урон цели."
  STR_PAPER_FLARE: "Фальшфейер"
  STR_PAPER_FLARE_UFOPEDIA: "Бумажный фальшфейер который освещает местность на коротокий промежуток времени (3 хода), после чего, становится бесполезным. Просто откройте крышку и выдерните чеку! {NEWLINE}{NEWLINE} ВНИМАНИЕ: После активации, выключение невозможно."
  STR_FLASHLIGHT: "Фонарь"
  STR_FLASHLIGHT_UFOPEDIA: "Устройтсво работающее от Элериевого аккумулятора позволяющее освещать местность вокруг. Поокуратнее когда будите включать эту штуку в ночи, т.к. недруги могут увидить и подстрелить вас."
  STR_FIRE_EXTINGUISHER: "Огнетушитель"
  STR_FIRE_EXTINGUISHER_UFOPEDIA: "Балон с порошковой пеной для тушения огня. Он так же наносит 32 ед. оглушающего урона отнимая столько же ОД. Так же можно хорошенько стукнуть неприятеля по башке. Наш инспектор по Охране труда ОЧЕНЬ настаивает что бы у нас была эта штука."
