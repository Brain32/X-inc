  # ИСЛЕДОВАНИЯ - ТЕХДЕРЕВО
  STR_OURORIGINS: "Наши истоки"
  STR_OURORIGINS_UFOPEDIA: "Прошло более 200 лет с того как космический флот обороны Земли X-com уничтожил последние оплоты пришельцев в нашей Солнечной системме. Много чего поменялось с тех пор и человечество освоило далёкий космос начав засеивать калониями близлижайшие уголки галактики.{NEWLINE}Кто мы такие? Кучка предприимчивых наёмников урвавшие небольшую военную базу на Земле. Наше акционерное руководство выброло тебя, криозаключенного из 2068 года, для руководства нашей наёмнической армией! У тебя же был опыт в руководстве подобных организаций, верно?"
  STR_INTEL_OFFICER_1: "Ввод в курс дела"
  INTEL_OFFICER_INTRODUCTION_UFOPEDIA: "Приветствую шеф! Надеюсь, восстановление после криозаморозки прошло без осложнений. Так как вы провели в морозильнике почти 150 лет, повзвольте мне ввести вас в курс дела. Наша организация - частная полиция, занимающаяся отловокой всякой швали в окрестностях мага-городов. Мы так же сотрудничаем с Мегаполом и прочими силовыми структурами Земли. Но так как последние несколько лет наша организация прибывала в упадке, советом директаров было принято решение назначить нового командующего - вас!{NEWLINE} Я очень надеюсь что вы справитесь с этой непростой задачей Шеф."
  STR_MEDICAL_BRANCH: "Медицина"
  STR_MEDICAL_BRANCH_UFOPEDIA: "Теперь мы можем разрабатывать свои собственные проекты различных медекаментов и аугминтаций."
  STR_PERSONNEL_REFORM: "Реформа Персонала"
  STR_PERSONEL_REFORM_UFOPEDIA: "Что бы эффективно упровлять вашей новой комапнией вы решили прошерстить её историю. Выйснялось что X-INC по сути была шелл-компанией по охране частных предприятий и гос. объектов, но её бывший руководитель и люди причастные к её основанию был влиятельными людьми. Но зачем тога было мелочится и создовать такое мелкое дочернее предприятие? Чёрт его знает. Ваша задача сделать из этого помойного ведра что-то стоящее, так что вы начали работать с имеющимися у вас ресурасми. Пора расширятся."
  STR_WEAPON_SHOPPING: "Оружейный шоппинг"
  STR_WEAPON_SHOPPING_UFOPEDIA: "Мы общарили городские лавки магазинов в поисках более уместной экипировки для нашей организации. Как и ожидалось, мы не нашли ничего интересного кроме всякого бесполезного хлама. Однако эти поиски навели нас на мысль углубится в дебри Чёрного рынка. Конечно, мы не сразу надём крутое военное снаряжение, и потребуется много времени что бы наладить связи, но попробывать всё же стоит.{NEWLINE}{NEWLINE}{ALT}Вы можете ознакомится с новым вооружением в КиберПедии.{ALT}"
  STR_GUNSHOP_ACCESS: "Доступ к Оружейному магазину"
  STR_GUNSHOP_ACCESS_UFOPEDIA: "Мы теперь можем покупать НОРМАЛЛЬНОЕ оружие. Конечно качество не ахти, но зато мы теперь можем вооружатся тем что уличные гопники покупают изподполы во всяких левых магазинах."
  STR_WASTELAND_MISSIONS: "Вылазки в Пустошь"
  STR_WASTELAND_MISSIONS_UFOPEDIA: "Пустошь - место возможностей, даже несмотря на то что это вонючая дыра заселённая мутантоми, бандитами и прочими отбросами общества. Местные будут очень заинтересованы в сотрудничестве с людми из мега-городов, вроде нас. В конце-концов, иметь друзей и соратников никогда не помешает, верно? {NEWLINE}{NEWLINE}Если наши информаторы что-нибудь разнюхают, то мы обязательно дадим вам знать, Шеф."
  STR_WASTELAND_WEAPON_FACTORY_PED: "Кустарные оружейные заводы"
  STR_WASTELAND_WEAPON_FACTORY_UFOPEDIA: "Найти ствол в Пустоши не легко. Найти хорошой ствол ещё сложнее. Опросив рейдеров и бандитов Пустошей, мы выйсняли что некоторые группировки имеют в своём распоряжение небольшие, но вполне функционируемые кустарные заводы, на которых производится самобытный огнестрел! Если нашим информаторам удастся найти подобные точки, то мы могли бы разжится подобным вооружением."
  STR_WEAPON_FACIL_RES: "!Оружейный завод Рейдеров!"
  STR_WASTELAND_LORE_1_PED: "Пустошь"
  STR_WASTELAND_LORE_1_UFOPEDIA: "После третьей Мировой Войны 84% Земли было выжжено ядерным пламенем. Данные территории в народе просто назвали Пустошью. Городске редко сюда лезут из-за многочисленных бандитов и мутанов, а Земное провительство и Мегапол, не особо любят тратить своё драгоценное время и ресурсы на мелкие междусобицы среди обитателей, по этому это место просто идеально для криминальных элементов. По этому здесь много работы для нас!"
  STR_BLACK_MARKET_ACCES: "Чёрный рынок"
  STR_BLACK_MARKET_UFOPEDIA: "Пробратся на сквозь дебри конспиралогии и секретности контактов которые могли бы нам дать какие-то нужные наводки было непросто, но нам это удалось! Познакомившись с конкретными людьми и потрясав кашельком у них перед носом нам открылся обширный мир нелегальных импланов, брони и оружия."
  STR_MILITARY_SUPLIES: "Доступ к военным поставки"
  STR_MILITARY_SUPPLIES: "Военные поставки"
  STR_MILITARY_SUPPLIES_UFOPEDIA: "Теперь когда у нас есть обширные связи с военнными, мы можем не парится о нехватке снабжении нормального вооружения и брони! Теперь мы можем покупать стандартные образцы военного оружия и брони для наших нужд."
  STR_RIMWORLD_SUPPLIES_ACCES: "Доступ к поставки колонистов"
  STR_RIMWORLD_SUPPLIES_UFOPEDIA: "Теперь мы можем заказывать оборудоване у поставшиков колониальный пихоту"
  STR_ELECTRONICS_UFOPED: "Поставки электроники"
  STR_ELECTRONICS: "Поставки электроники"
  STR_ELECTRONICS_UFOPEDIA: "Вообще, совремная электроника XXIV века не является чем-то запутанным, что бы разбирать и иcледовать каждую детальку. Информация уже давно есть в свободном доступе, не считая запатентованых и сверхсложных энергосхем. Всё что нам нужно - найти надёжных поставщиков такого добра. Теперь когда дело сделано мы можем заказывать конкертные виды электронники и оборудованя для наших нужд."
  STR_BASIC_ARMOUR_DESIGN: "Базовый дизайн брони"
  STR_BASIC_ARMOUR_DESIGN_UFOPEDIA: "Изучив доступные на рынке виды боевой брони. Мы заметили что в них в основном используется лёгкие но прочные материалы, такие как например полимеры или пластисталь. Обычно они хорошо подходят для рассеевания кинетической энергии. Изучив обработку таких сложных материалов мы можем разрабатывать уже свои собвственные бронекостюмы не завися от этих грёбаных и жадных спекулянтов б/ушного шерпотрёпа."
  STR_MINIGUN_LICENSE_PED: "Приобретение лицензии на пулеметы"
  STR_MINIGUN_LICENSE_UFOPEDIA: "После долгой возни с бюрократической машиной мы наконец-то можем покупать пулеметы и даже миниганы военных образцов. Конечно сперва нам нужно найти и изучить их производителя таких стволов, но покранйей мере купить их будет по проще."
  STR_MINIGUN_LICENSE: "Лицензия: Пулеметы"
  STR_EXPLOSIVES_LICENSE_PED: "Приобретение лицензии на взрывчатку"
  STR_EXPLOSIVES_LICENSE_UFOPEDIA: "Теперь мы можем покупать ракетницы и гранаты у провереных потсавщиков."
  STR_EXPLOSIVES_LICENSE: "Лицензия: Взрывчатка"
  STR_BASE_EXPANSION_PROJECT: "Проект по расширению базы"
  STR_BASE_EXPANSION_PROJECT_UFOPEDIA: "Теперь мы можем строить молдули базы!"
  STR_ALIEN_ALLOYS_MATRIX: "Матрица Пластистали"
  STR_ALIEN_ALLOYS_MATRIX_UFOPEDIA: "Найдя нужные чертежи на чёрном рынке, мы теперь можем сами производить пластисталь и все прочие нужные компоненты."
  OLD_MILBASE_MISSION_PED: "!Рейды по старым военным базам!"
  STR_OLD_MILBASE_MISSION_READY_UFOPEDIA: "Мы поговорили с несколькими вождями рейнджеров Пустоши, и они согласились пропустить нас на территории старых военных баз. Они предупреждают, что там могут встретиться мутанты и старые роботы-охранники, которые разорвут в клочья любого, кто осмелится войти внутрь. Поэтому они советуют нам быть готовыми к подобным вылазкам и сразу же дадут знать, если представится такая возможность. Но некоторым нашим 'акционерам' не понравятся такого рода... вольности, на которые мы идем."

