  STR_STIMM: "Стимулятор"
  STR_STIMM_UFOPEDIA: "Этот инъектор содержи стимулируещее вещество которое может поднять человека на ноги и привести его в чувство. Воставаливает 50 ОВ и снимает 25 ед. Оглушения."
  STR_MEDIPACK_SMALL: "Малый Медпакет"
  STR_MEDIPACK_SMALL_UFOPEDIA: "Устройство, которое содержит небольшое количество медекоментов для оброботоки ран на поле боя. Дозировки медикоментов хватает на 2 применения (обработка каждой раны восстанавливает 2 ОЗ). Так же в аптечке есть 2 дозы обезболивающего (восстанавливает утраченный из-за ранений Боевой дух) и 2 инъекции мощного стимулятора (каждая устраняет 25 ед. Оглушения).{NEWLINE}Самолечение невозможно."
  STR_MEDIPACK_MID: "Медпакет"
  STR_MEDIPACK_MID_UFOPEDIA: "Пакет с продвинутыми медикаментами, который вамешает больший ассортимент препоратов.{NEWLINE}Самолечение невозможно."
  STR_SMALL_MEDKIT: "Малая Аптечка"
