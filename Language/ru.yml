  STR_FLASHDRIVE_RAIDERS_UFOPEDIA: "Помимо порнушки и планов маршрутов рейдерских конвоев, в этом старом устройстве на удивление много полезных данных. Различные энерго схемы убежищ, чертежы лазерного и плазменого оружия и чёрт знает сколько всего что Рейдерам удалось перезаписать во время своих погромов.{NEWLINE}{NEWLINE}Покопавшись ещё глубже, мы выйсняли что есть ещё более обширные бункеры военного назначения. Если бы нам как следует распросить жителей Пустошей, мы могли бы найти такие точки и обживится дововенными сокровищами этих бункеров."
