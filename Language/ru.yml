  STR_MICRO_UZI: "Узи"
  STR_UZI_CLIP: "Маг. Узи"
  STR_MICRO_UZI_UFOPEDIA: "Этот ствол был настоящим хитом среди пистолетов-пулимётов в довоенные времена. Приклад позволяет стрелку вести прицельный огонь."
