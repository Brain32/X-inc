# STR_ACCESS_LIFT: ""
  STR_ACCESS_LIFT_UFOPEDIA: "Основа-основ любой базы. Сюда доставляют персонал и необходимое оборудование прямо к нам под землю. К сожаленю, он является уязвимой частью нашей базы для врагов и неприятелей, так как мы не можем обезопасить вход с поверхности полностью. Предоставляет {ALT}25{ALT} единиц складской площади.{NEWLINE}Отдых: 1"
# STR_LIVING_QUARTERS: ""
  STR_LIVING_QUARTERS_UFOPEDIA: "Здесь живёт и отдыхает персонал нашей базы: учёные, инжинеры и оперативнки. Каждый модуль расичтан на {ALT}35{ALT} жилых мест.{NEWLINE}Отдых: 2"
  STR_PRISON_CELLS: "Тюремные камеры"
  STR_PRISON_CELLS_UFOPEDIA: "Всякие невежды и прочий сброд который нам удасться споймать живём мы кидаем сюда. расчитан на 12 мест."
  STR_GYM: "Спортзал"
  STR_GYM_UFOPEDIA: "Этот модуль оборудован для тренеровки наших агентов. Расчитан на 8 оперативников."
  STR_MEDBAY: "Медотсек"
  STR_MEDBAY_UFOPEDIA: "Медотсек позволяет госпитализировать наших оперативников прямо на нашей базе, что сокращает восстановительный период. В комплект так же входит оборудование и услуги фиксера, который может делать нашим агентам кибер аушментации."
  STR_ADVANCED_MEDBAY: "Продвинутый медотсек"
  STR_ADVANCED_MEDBAY_UFOPEDIA: "Больше плюшек и больше игрушек. Восстановительный период уменьшен за счёт продвинутого оборужывания. Так же фиксер может делать продвинутые аугментации нашим агентам."
  STR_CORRIDOR: "Коридор"
  STR_CORRIDOR_UFOPEDIA: "Корридорный корридор для корридорывания корридоров. Может надстраиватся что сакортит время постройки нового модуля."
  STR_BIG_LIVING_QUARTERS: "Большие жилые модули"
  STR_BIG_LIVING_QUARTERS_UFOPEDIA: "Просторный модуль расчитаный на 185 лиц. Спроектирован так что бы эффетивно экономить место. Поверх этого имеет небольшой склад на 50 едениц.{NEWLINE}Отдых: 4"
  STR_HQ: "Штаб-квартира"
  STR_HQ_UFOPEDIA: "В этом модуле обрабатываются запросы наших клиентов. Он так же оснащён простым радаром и небольшой лабораторией на 10 человек, где можно проводить базовые исследования или допросы."
  STR_RECREATION_ROOM: "Комната отдыха"
  STR_RECREATION_ROOM_UFOPEDIA: "Небольшой отсек с минибаром, аркадными автоматами и столовой, всё для спокойного времяприпровождении между миссиями для наших оперативников. Имеется небольшая кладовка ({ALT}+10{ALT} складской площади). Даёт {ALT}15 000{ALT} кредитов пассивного ежемесячного дохода.{NEWLINE}Отдых: 8"
  STR_POWER_PLANT: "Электростанция"
  STR_POWER_PLANT_UFOPEDIA: "Небольшоая электростанция необходимая для некоторых построек на нашей базе. Невероятно дорогостоящая в постройке, но при окончании, буде периносить доход т.к. излишки можно продовать близлижайщим поселениям.{NEWLINE}Для постройки нужны 2 Кор-двигателя"
  STR_ALLOY_FACTORY: "Фабрика сплавов"
  STR_ALLOY_FACTORY_UFOPEDIA: "Получив нужные чертижи и знания мы можем теперь самостоятельно производить сплавы независя от поставщиков или того что нам удастася найти во время наших вылазак. Этот модуль оборудован всеми необходими инстурментами и оборудованием для производства пластистали. Более того этот модуль нужен для производства более точных деталей сделаных из пластистали. Требует Электростанция. Даёт 20 рабочего места."
  STR_ROBOT_WORKSHOP: "Мастерская роботов"
  STR_ROBOT_WORKSHOP_UFOPEDIA: "Этот отсек оборудован всем необходимым для производства дронов, загрузки простых ИИ в центральные процессоры и сборочной линией для производства наших собственных роботов и боевых платформ! Требует Электростанцию. Даёт 80 рабочего места."
  STR_COMM_CENTER: "Центр связи"
  STR_COMM_CENTER_UFOPEDIA: "Полезный модуль для доступа в Гипер Сеть и установки каких-либо контактов. Мы так же можем обробатывать дополнительные задания или поручения от наших работодателей, так что иметь такую штутку не повредит. Предотсавляет 5 рабочих мест для учёных.{NEWLINE} Для постройки требует электростанцию. Можно построить один модуль на одну базу."
  STR_SCIENCE_CENTER: "Научный центр"
  STR_SCIENCE_CENTER_UFOPEDIA: "Большой комплекс в котором может трудится 30 учёных, для разработки оборудования и порчих ништяков. Оборудован передовой биолабороторией, железом для быстрой обработкой данных и доступом к военными научными центрамии. И вишинка на торте - небольшой мед отсек который сокрашает время личения раненых бойцов.{NEWLINE}Можно построить один модуль на одну базу."
  STR_CYBER_HQ: "Кибер-штаб"
  STR_CYBER_HQ_UFOPEDIA: "Расширив свои знания в кибернетике, мы смогли создать проект по улучшению нашей Штаб-квартиры. Впихнув кучу новомодных и дорогих игрушек таких как распознователь синтеза речи и Личностный модуль, мы увиличили эффективность работы на 140%. Другими словами мы можем запишнуть сюда на 4 яцеголовых больше чем обычно!"
  STR_LAB_T1: "Простая лабаратория"
  STR_LAB_T1_UFOPEDIA: "Небольшая лаборатория на 10 учёных. Имеет самое простое оборудование для разработки несложных проектов, по типу матераилов и компонентов."

