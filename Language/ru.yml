  # ТРЕНЕРОВКИ
  STR_TRANSFORMATIONS_AND_AUGS_UC: "ТРАНСФОРМАЦИИ и АУГМЕНТАЦИИ"
  STR_BASIC_FIREARMS_TRAINING: "Базовая стрелковая подготовка"
  STR_TRNS_BASICSHOOTING_PED: "Базовая стрелковая подготовка"
  STR_BASICSHOOTING_UFOPEDIA: "Немного поговорив с отделом кадров, вы, к своему ужасу, узнали что никто из новобранцев не проходит базовую стрелковую подготовку! Пришлось немного повозится с ресурсами из вне для организации нормального обучения.{NEWLINE}{NEWLINE}Теперь наши оперативники могут пройти стрелковые курсы что повысит навых их {ALT}Стрельбы{ALT} на 12 и {ALT}Реакцию{ALT} на 4. Подготовка длится 6 дней и обойдётся в 7 000 кредитов, также требуется спорт зал."
  # АУГМЕНТАЦИИ
  STR_AUGMENTATION_BASICS: "Аугментации Агентов"
  STR_AUGMENTATION_BASICS_UFOPEDIA: "Мы живём в век где кибернитизация людей не такая уж и редкое и дорогое дело как это было раньше. Всё что нам нужно это оборудование, специалист который мог бы нам их установить и само железо. Но вживлять импланты других производителей довольно рисковое занятие. Поэтому мы придумали простое, но гениальное решение - переустанавливать ОС имплантов и просто обновлять железо уже имеющихся. Поэтому устанавливать импланты нашим оперативникам следует поочерёдно."
  STR_AUG_MIL_NEIROIMPLANT: "Военный нейроимплант"
  STR_AUG_MIL_NEIROIMPLANT_UFOPEDIA: "Очень дорогая штука. Обычно такое железо устанавливается членам элитных подразделений или телохронителям генеральных директоров различных коропораций. Интерфейс настолько превосходный что даже не влияет концентрацию оперативника.{NEWLINE}{NEWLINE} +8 к Точности; {NEWLINE} +8 к Реакции;{NEWLINE} +6 к Ближнему Бою;{NEWLINE} +8 к Точность броска;{NEWLINE} +1 к Концентрации;{NEWLINE} +3 к Морали (за ход)."
  STR_AUG_SPAMTON_GLASSES: "СЛОМАНЫЕ ОЧКИ"
  STR_AUG_SPAMTON_GLASSES_UFOPEDIA: "ЭТО [[Прекрасное]] И [[Сногшибательное]] [Торговое Наиминование] СДЕЛАЮТ ИЗ ВАС ПО-НА100ЯЩЕМУ [[Ссылка Заблокирована]]. ВСЁ ЧТО ВАМ НУЖНО ЭТО [Детали Аккаунта] и [[Цифры На Обратной Стороне]]. ИМЕЮТСЯ [Побочные Эффекты] В ВИДЕ [[Дискомфорт И Боль В Животе?]].{NEWLINE} +65.535 к ОД.{NEWLINE} +65.535 к Энерги.{NEWLINE} +65.535 к Здоровью.{NEWLINE} +65.535 к [[Кишки]].{NEWLINE} +65.535 к Реакции.{NEWLINE} +65.535 к Точность стрельбы.{NEWLINE} +65.535 к Точность броска.{NEWLINE} +65.535 к Силы.{NEWLINE} +65.535 к Пси Силе.{NEWLINE} +65.535 к Пси Навыку"
  # АУГМЕНТАЦИИ - ГЛАЗА
  STR_AUG_EYE_MK1: "Глазной имплант Mk1"
  STR_AUG_EYE_MK1_UFOPEDIA: "Корпоративный окуляр 'Сканер'. Увеличительное зрение, встроенный переводчик вывесок и анализ лояльности по микровыражениям. Реклама отключена за дополнительную плату.{NEWLINE}{NEWLINE} +12 к Точности;{NEWLINE} -1 к Концентрации."
  STR_AUG_EYE_MK2: "Глазной имплант Mk2"
  STR_AUG_EYE_MK2_UFOPEDIA: "Глазной имплант военного образца заточенный на боевые ситуации. Новый интерфейс будет немного пидрить голову пользователю.{NEWLINE}{NEWLINE} +8 к Точности;{NEWLINE} +2 к Н/В."
  STR_AUG_EYE_MK3: "Глазной имплант Mk3"
  STR_AUG_EYE_MK3_UFOPEDIA: "Тактический визор 'Сокол'. Ночное видение, тепловизор, дальномер и баллистический вычислитель. Разработан для снайперов частных военных компаний.{NEWLINE}{NEWLINE} +6 к Точности;{NEWLINE} +6 к Реакции;{NEWLINE} +4 к Н/В."
  # АУГМЕНТАЦИИ - РУКИ
  STR_AUG_ARM_MK1: "Имплантат рук Mk1"
  STR_AUG_ARM_MK1_UFOPEDIA: "Бюджетные усиливающие экзо-мускулы. Хлипкие, часто скрипят, но позволяют закручивать гайки без ключа и открывать банки с солеными огурцами одной левой. Любимы грузчиками и сантехниками.{NEWLINE}{NEWLINE} +10 к Cиле;{NEWLINE} -1 к Концентрации."
  STR_AUG_ARM_MK2: "Имплантат рук Mk2"
  STR_AUG_ARM_MK2_UFOPEDIA: "Прочный стабилизированный каркас. Дает железную хватку, повышает меткость при стрельбе из тяжелого оружия и позволяет согнуть стальную балку в случае драки. Стандарт для корпоративной охраны{NEWLINE}{NEWLINE} +6 к Cиле;{NEWLINE} +2 к Точности."
  STR_AUG_ARM_MK3: "Имплантат рук Mk3"
  STR_AUG_ARM_MK3_UFOPEDIA: "Гидравлический монстр с рельефным карбоновым покрытием. Полная замена предплечья с интегрированным креплением для лёгкого вооружения и имеет лазерный целеуказатель прямо в кисти!{NEWLINE}{NEWLINE} +8 к Cиле;{NEWLINE} +5 к Точности."
  # АУГМЕНТАЦИИ - НОГИ
  STR_AUG_LEG_MK1: "Имплантат ног Mk1"
  STR_AUG_LEG_MK1_UFOPEDIA: "Потребительская модель «Курьер». Лёгкие амортизационные системы для доставщиков и тех, кто вечно опаздывает. Гасят удар при прыжке с 2-го этажа и экономят 15% энергии при беге. Склонны к скрипу в дождливую погоду. Реклама обещала «прыжок как у кенгуру», но не уточняла, какого именно.{NEWLINE}{NEWLINE} +12 к ОД;{NEWLINE} +8 к Выносливости;{NEWLINE} -2 к Морали (за ход)."
  STR_AUG_LEG_MK2: "Имплантат ног Mk2"
  STR_AUG_LEG_MK2_UFOPEDIA: "Тактический каркас «Гонец». Увеличивает скорость передвижения и высоту прыжка, стабилизирует стойку. Адаптивная амортизация. Любимы паркуристами нео-города и монтажниками.{NEWLINE}{NEWLINE} +8 к ОД;{NEWLINE} +6 к Выносливости."
  STR_AUG_LEG_MK3: "Имплантат ног Mk3"
  STR_AUG_LEG_MK3_UFOPEDIA: "Тактический спринтерский комплекс «Грифон». Позволяют развивать спринтерскую скорость до 55 км/ч на короткой дистанции. Поверх того не нагружает мышцы ног и торса.{NEWLINE}{NEWLINE} +6 к ОД;{NEWLINE} +10 к Выносливости."
  # АУГМЕНТАЦИИ - МОЗГ
  STR_AUG_BRAIN_MK1: "Мозговой имплант Mk1"
  STR_AUG_BRAIN_MK1_UFOPEDIA: "Базовая модель нейрлимпланта для офисного планктона. Позволяет держать в уме три рабочих чата, два календаря и напоминание купить молоко. Побочные эффекты включают лёгкий тиннитус (-1 Концентрации за ход.) и навязчивую рекламу во время сна.{NEWLINE}{NEWLINE} +12 к Реакции;{NEWLINE} +8 к Ближнему бою;{NEWLINE} +10 Пси навыку;{NEWLINE} +10 Пси Силе;{NEWLINE} -1 к Концентрации."
  STR_AUG_BRAIN_MK2: "Мозговой имплант Mk2"
  STR_AUG_BRAIN_MK2_UFOPEDIA: "Любимая модель хакеров средней руки и корпорационных акул. Ускоряет реакцию, улучшает распознавание угроз и целей, стимулирует важные области мозга и позволяет на 5 минут в день замедлить субъективное время.{NEWLINE}{NEWLINE} +10 к Реакции;{NEWLINE} +6 к Ближнему бою;{NEWLINE} +8 Пси навыку;{NEWLINE} +8 Пси Силе."
  STR_AUG_BRAIN_MK3: "Мозговой имплант Mk3"
  STR_AUG_BRAIN_MK3_UFOPEDIA: "Тактический ИИ «Оракул». Штучный товар для спецназа и корпоративных охраников. Улучшенное ПО анализатора угроз, обеспечивает замедленное восприятие времени и прямой нейро-интерфейс. Может вызывать социопатические наклонности и потерю эмпатии.{NEWLINE}{NEWLINE} +8 к Реакции;{NEWLINE} +6 к Ближнему бою;{NEWLINE} +6 Пси навыку;{NEWLINE} +6 Пси Силе."
  # АУГМЕНТАЦИИ - ЛЁГКИЕ
  STR_AUG_LUNG_MK1: "Имплант лёгкого Mk1"
  STR_AUG_LUNG_MK1_UFOPEDIA: "Дешёвый имплант лёгкого.{NEWLINE}{NEWLINE} +12 к Выносливости;{NEWLINE} +4 к Выносливости за ход;{NEWLINE} +2 к ОД за ход;{NEWLINE} -1 к Концентрации за ход."
  STR_AUG_LUNG_MK2: "Имплант лёгкого Mk2"
  STR_AUG_LUNG_MK2_UFOPEDIA: "Нормальный имплант лёгкого.{NEWLINE}{NEWLINE} +8 к Выносливости;{NEWLINE} +2 к Выносливости за ход;{NEWLINE} +1 к ОД за ход;{NEWLINE} -1 к Концентрации за ход."
